      fractures: [L-06, L-07]
    - role: "Mid-session reward"
      rpc: rpc_issue_mid_session_reward
      writes: loyalty_ledger
      outbox: none
      fractures: [L-08, L-09]
      notes: "spoofable staff; possibly dead"
    - role: "Manual credit"
      rpc: rpc_manual_credit
      writes: loyalty_ledger
      outbox: none
      fractures: [L-08]
    - role: "Promotion"
      rpc: rpc_apply_promotion
      writes: loyalty_ledger
      outbox: null
      fractures: [L-06]
      notes: "promo emits outbox-only elsewhere"
    - role: "Promo coupons"
      rpc:
        [rpc_issue_promo_coupon, rpc_void_promo_coupon, rpc_replace_promo_coupon, rpc_promo_coupon_inventory, rpc_promo_exposure_rollup]
      writes: promo tables
      outbox: null
      fractures: []
      tier: 2
      notes: unaudited
    - role: "Redemption"
      rpc: [rpc_redeem, rpc_redeem_loyalty_locally]
      writes: loyalty_ledger
      outbox: none
      fractures: [L-12]
    - role: "Valuation policy"
      rpc: rpc_update_valuation_policy
      writes: loyalty_valuation_policy
      outbox: null
      fractures: [L-01, L-02]
      notes: "feeds L-01/L-02"
    - role: "Liability projection"
      rpc: rpc_snapshot_loyalty_liability
      writes: loyalty_liability_snapshot
      outbox: null
      fractures: [L-01, L-02]
      active_slice: true
    - role: "Balance reconcile"
      rpc: rpc_reconcile_loyalty_balance
      writes: "(MV)"
      outbox: null
      fractures: [L-04]
      notes: "dead detector"
    - role: "Ledger read"
      rpc: [rpc_get_player_ledger, rpc_get_visit_loyalty_summary]
      writes: read
      outbox: null
      fractures: []
    - role: "Policy eval (pure)"
      rpc: [evaluate_mid_session_reward_policy, evaluate_session_reward_suggestion]
      writes: none
      outbox: null
      fractures: [L-07]
      notes: "modal estimate"
    - role: "Reversal / correction"
      rpc: ABSENT
      writes: null
      outbox: null
      fractures: [L-05]
      notes: "enum/DTO/Zod only; no RPC"

# ── §5 Core Authority Topology [G CALLS-census + D] ──────────────────
core_topology:
  evidence: ["G CALLS-census", D]
  producers:
    - rpc: rpc_accrue_on_close
      trigger: "rating-slip close"
      callers:
        [use-close-with-financial.ts, use-move-player.ts, use-loyalty-mutations.ts]
      semantics: "ledger only, NO outbox, fire-and-forget"
      seam: seam_rs_close
      fractures: [L-06, L-07]
    - rpc: rpc_manual_credit
      trigger: "reward drawer"
    - rpc: [rpc_redeem, rpc_redeem_loyalty_locally]
      trigger: "recognition / comp"
      callers: [use-recognition-mutations.ts]
    - rpc: rpc_issue_mid_session_reward
      notes: "dead?"
    - rpc: rpc_apply_promotion
  ledger:
    table: loyalty_ledger
    properties: ["append-only (deny_update/deny_delete)", "reversal model ABSENT [D L-05]"]
    outbox_emit: "same-txn emit target, NOT wired"
  outbox:
    table: loyalty_outbox
    consumer: NONE
    fracture: L-06
  balance_cache:
    table: player_loyalty
    column: current_balance
    nature: "de-facto cache; no constraint/trigger"
    fracture: L-03
    declared_as: "SUM but read as cache"
    dead_reconcile_mv: mv_loyalty_balance_reconciliation
    dead_reconcile_fracture: L-04
  downstream:
    - branch: balance consumers
      nodes: [loyalty-panel, rs-modal, comp-confirm-panel, player-360 header]
      behavior: "all read cache"
      fracture: L-03
    - branch: valuation
      nodes: [loyalty_valuation_policy]
      detail: "versioned; rpc_update_valuation_policy; getActiveValuationCentsPerPoint"
    - branch: liability projection
      active_slice: true
      rpc: rpc_snapshot_loyalty_liability
      formula: "SUM(current_balance) × policy WHERE is_active"
      upsert_key: [casino_id, snapshot_date]
      behavior: "re-prices"
      fracture: L-01
      see: "§6"
  graph_corrections:
    - node: getActiveValuationCentsPerPoint
      finding: >-
        the TS is_active live-rate read has ONE caller — issueComp (redemption).
        It is NOT on the liability path.
      evidence: G
    - node: accrueOnClose
      callers:
        [use-close-with-financial.ts, use-move-player.ts, use-loyalty-mutations.ts]
      note: "use-move-player.ts is the non-atomic close seam"
      evidence: G
    - node: redeemLoyaltyLocally
      callers: [use-recognition-mutations.ts]
      evidence: G

# ── §6 Valuation / Liability Subsystem — active slice [R] ────────────
valuation_liability_subsystem:
  evidence: R
  truth_source: loyalty_ledger
  policy:
    table: loyalty_valuation_policy
    versioned_by: [effective_date, version, is_active]
    selection: "WHERE is_active=true  ← NOT as-of"
    evidence_ref: "R 20260307115101:56-77"
  projection_rpc:
    name: rpc_snapshot_loyalty_liability
    upsert_key: [casino_id, snapshot_date]
    behavior: "re-run RE-PRICES"
    evidence_ref: "R :80"
    writes:
      [total_outstanding_points, estimated_monetary_value_cents, valuation_policy_version, valuation_effective_date, player_count]
    target_table: loyalty_liability_snapshot
  consumers:
    - path: MEASUREMENT
      chain: "getSummary → queryLoyaltyLiability"
      ref: "queries.ts:242-256"
      behavior: "fetches snapshot AND live policy is_active separately"
      mapper:
        name: mapLoyaltyLiabilityRow
        ref: "mappers.ts:276"
        fields:
          estimatedMonetaryValueCents: "snapshot (PINNED)"
          centsPerPoint: "LIVE policy  ← L-02 contradiction"
        drops: [valuation_policy_version, valuation_effective_date]
        drop_fracture: L-13
      renders_to: LoyaltyLiabilityWidget
      widget_note: "renders DTO only; innocent [G]; DEFERRED phase_5"
    - path: REPORTING
      chain: "buildReport → buildLoyaltyLiability"
      ref: "assembler.ts:517"
      behavior: "no fetch — maps snapshot"
      renders_to:
        - target: LoyaltyLiabilityPdf
          ref: "pdf/template.tsx"
          status: "LIVE S4"
        - target: "LoyaltyLiability (ShiftReportDocument)"
          note: "HTML co-consumer"
  cure:
    name: "Cure B (as-of versioned; no transport)"
    rules:
      - "snapshot reads policy effective at cutoff"
      - "identity = (casino_id, snapshot_date) with policy_version derived"
      - "consumers render the snapshot's own version/as-of"
      - "delete the queries.ts:250-256 live-policy fetch"
    negative_test: "rate edit after snapshot does not change the reported figure"
    refs: [SLICE-MANDATE-001, SHADOW-CONTEXT-SLICE-MANDATE-001]

