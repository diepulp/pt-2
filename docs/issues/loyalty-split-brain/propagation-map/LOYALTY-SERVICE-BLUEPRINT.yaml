# Machine-readable companion to LOYALTY-SERVICE-BLUEPRINT.md
# Loyalty Service Blueprint — Topology & Architecture Map
# Prose source-of-truth: ./LOYALTY-SERVICE-BLUEPRINT.md (every field here mirrors a section there)

schema_version: 1
kind: service-blueprint
companion_of: ./LOYALTY-SERVICE-BLUEPRINT.md

meta:
  title: "Loyalty Service Blueprint — Topology & Architecture Map"
  status: Proposed
  date: "2026-06-24"
  owners:
    map: split-brain-authority
    truth: LoyaltyService SRM owner
  why: >-
    No accurate full-service map existed before the canon-propagation program.
    services/loyalty/README.md is a stale mid-session-reward-era snapshot
    (claims 3 tables / 2 RPCs / a non-existent outbox worker); SRM §449 is
    ownership-only; LANE-SPLITBRAIN.md is fracture-lens only. This blueprint is
    the current, code-derived topology.
  method: >-
    GitNexus code graph (index main@6b8d9372, 49340 nodes, embeddings:0) +
    migration/SRM Reads. Every node is graph-enumerated; producer/consumer edges
    are graph CALLS-census; SQL RPC bodies and DTO field maps are Read-confirmed.
    Graph leads, Read certifies.
  index:
    ref: "main@6b8d9372"
    nodes: 49340
    embeddings: 0

evidence_legend:
  G: graph-verified
  R: Read-confirmed
  SRM: ownership ledger
  Dx: "diagnosis L-xx"

# ── §1 Service Identity ──────────────────────────────────────────────
identity:
  bounded_context: "LoyaltyService (Reward Context)"
  question: "What is this gameplay worth in rewards?"
  canonical_stance:
    evidence: "SRM §455"
    statement: >-
      Loyalty is the sole source of truth for rewards; rating_slip stores
      telemetry only and never caches reward balances.
  pattern: "Contract-first (manual DTOs), functional factory per index.ts"
  surface_scale:
    evidence: G
    backend_files_approx: 31
    functions_approx: 270
    subdomains: 4
    graph_communities:
      Loyalty: 122
      Reward: 41
      Rewards: 3
    consumer_surface: "100+ component/hook/app files (census truncated at cap)"

# ── §2 Subdomain Decomposition [G] ───────────────────────────────────
subdomains:
  - name: core
    root: services/loyalty/
    responsibilities:
      [ledger, balance, valuation, liability, accrual, redemption]
    modules:
      crud.ts: 13
      http.ts: 10
      index.ts: 13
      mappers.ts: 21
      keys.ts: 22
      schemas.ts: 2
      selects.ts: null
      cadence.ts: 6
      rollups.ts: 6
      mid-session-reward.ts: 4
    tier: 1
  - name: promo
    root: services/loyalty/promo/
    responsibilities: [promotion programs, coupons, exposure]
    modules:
      crud.ts: 13
      http.ts: 12
      index.ts: 13
      mappers.ts: 21
      schemas.ts: 1
    tier: 2
    fracture_audited: false
  - name: reward
    root: services/loyalty/reward/
    responsibilities:
      [reward catalog, price points, entitlement tiers, limits, eligibility]
    modules:
      crud.ts: 9
      http.ts: 8
      index.ts: 9
      keys.ts: 7
      mappers.ts: 22
    tier: 2
    fracture_audited: false
  - name: printing
    root: services/loyalty/printing/
    responsibilities:
      [receipt rendering, ESC/POS, CUPS, loopback agent]
    prds: [PRD-092, PRD-093]
    dirs: [adapters/, agent/, renderers/, templates/]
    modules:
      http.ts: 10
      index.ts: 4
    tier: 2
    fracture_audited: false

propagation_relevance: >-
  The canon program (liability → balance/reversal → outbox → convergence) lives
  almost entirely in core. promo/, reward/, printing/ are Tier-2 here —
  inventoried, not yet fracture-audited.

# ── §3 Owned Tables → Subdomain [SRM §451 + migrations, R] ───────────
tables:
  evidence: ["SRM §451", migrations, R]
  count: 13
  readme_claims: 3
  groups:
    - subdomain: core/ledger
      tables: [player_loyalty, loyalty_ledger, loyalty_outbox]
      notes: >-
        ledger append-only (deny_update/deny_delete);
        player_loyalty.current_balance is the de-facto cache [D L-03];
        outbox has no consumer [D L-06]
    - subdomain: valuation/liability
      tables:
        [loyalty_valuation_policy, loyalty_liability_snapshot, loyalty_earn_config]
      notes: >-
        policy versioned (effective_date/version/is_active); snapshot carries
        valuation_policy_version + valuation_effective_date
    - subdomain: promo
      tables: [promo_program, promo_coupon]
      notes: null
    - subdomain: reward
      tables:
        [reward_catalog, reward_price_points, reward_entitlement_tier, reward_limits, reward_eligibility]
      notes: null

