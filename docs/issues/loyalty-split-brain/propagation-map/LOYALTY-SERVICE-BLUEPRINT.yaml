      purpose: "visit_kind accrual eligibility, session context"
    - from: CasinoService
      dto: StaffDTO
      purpose: "issuer attribution"
  provides:
    dtos:
      [PlayerLoyaltyDTO, LoyaltyLedgerEntryDTO, LoyaltyLiabilitySnapshotDTO]
