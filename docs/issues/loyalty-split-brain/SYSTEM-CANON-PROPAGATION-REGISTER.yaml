# -----------------------------------------------------------------------------
# RATING SLIP ESCALATION  (directive §10)
# -----------------------------------------------------------------------------
rating_slip_escalation:
  preliminary_outcome: B_leaning_C
  rationale: >
    Close->accrual is not a boundary-only defect: ingress cannot atomically supply a
    downstream domain (close RPC commits; accrual is a separate fire-and-forget client
    call, errors swallowed). The same hook fans out a non-atomic pit-cash/PFT
    observation, so one unsafe client fan-out feeds finance + telemetry + loyalty —
    the Outcome C tell. RS internal lifecycle appears single-owned (post-close edits
    rejected), keeping Outcome B on the table.
  seams_requiring_certification_first:
    - seam_rs_close_accrual    # top priority: atomic/durable close->accrual, no silent loss
    - seam_rs_modal_estimate   # label live estimate; freeze basis at close
  decision_test: >
    Is the unsafe client fan-out loyalty-specific (B) or general across
    finance+telemetry+loyalty (C)? pit-cash co-orchestration is early evidence for C.

# -----------------------------------------------------------------------------
# PROOF OBLIGATIONS  (directive §14 — five classes, never collapsed to one flag)
# -----------------------------------------------------------------------------
proof_obligations:

  tia:
    mechanism: PROVEN                       # three-state machine + frozen formula; unit+int tests
    producer_capability: PROVEN             # grind RPC + finance bridge write qualifying kinds w/ idempotency
    workflow_certification: PARTIAL         # producers live; no E2E proving operator session -> panel projection
    consumer_certification_per_session: PROVEN          # render-only static gate
    consumer_certification_aggregate: UNPROVEN          # shift-metrics/report win-loss = TODO-WS4 (deferred)
    suppression_winloss: PROVEN             # suppression gate + computeTableRundown quarantined
    suppression_drop_aggregate: NOT_PROVEN  # estimated_drop_buyins_total_cents survives on 2 dashboards

  outbox_pft_lane:
    mechanism_proof: PROVEN                 # same-txn insert; I1 5/5; PRD-082 live; immutability trigger
    producer_capability_proof: PROVEN_PER_PRODUCER      # txn/grind exemplar; adj PRD-084 20/20; fill/credit I1 unit
    workflow_certification: PARTIAL_DEVIATED            # buyin/adj live; grind UI no integration cert; fill/credit operator UI deferred PWB-002; RELAY PROD TRIGGER DEVIATED (GHA */5 vs ADR-056 Vercel cron) -> AP-3
    consumer_certification: FAILING_AT_RENDER           # DTOs carry envelope; render strips it -> AP-7; only entitlement-confirm-panel + outbox observability certified
    suppression_proof: NOT_DONE             # no removal gate on bare-dollar surfaces (AP-4); pit_cash_observation dead taxonomy unremoved

  loyalty_liability_slice:                  # L-01/02, Cure B (as-of versioned valuation) — L-05 corrected out 2026-06-22 (belongs to loyalty_balance_reversal_slice)
    mechanism: as_of_policy_lookup_deterministic
    producer_capability: snapshot_rpc_idempotent_on_casino_date_policy
    workflow_certification: real_shift_report_supplies_cutoff_and_policy
    consumer_certification: shift_report_renders_snapshot_rate_version_asof_no_live_fetch
    suppression: remove_is_active_only_valuation_reads

  loyalty_balance_reversal_slice:           # L-03/04/05
    mechanism: ledger_sum_equals_balance_AND_reversal_nets_zero
    producer_capability: rpc_reverse_loyalty_ledger_entry_valid_inputs
    workflow_certification: real_reversal_supplies_original_entry_id
    consumer_certification: all_surfaces_read_one_balance_dto
    suppression: remove_current_balance_direct_reads+delete_or_activate_dead_mv

  loyalty_outbox_slice:                     # L-06, Cure A (reuse Wave 2 I1-I4)
    mechanism: same_txn_outbox_insert
    producer_capability: accrual_emits_ledger_plus_outbox
    workflow_certification: real_close_emits
    consumer_certification: projection_only_idempotent_consumer
    suppression: no_ledger_only_or_outbox_only_producers_remain

  rating_slip_seam_slice:                   # seam_rs_close_accrual
    mechanism: atomic_or_durable_close_to_accrual
    producer_capability: close_path_settles_accrual_on_valid_slip
    workflow_certification: real_operator_close_does_not_silently_drop_accrual   # currently FAILS
    consumer_certification: modal_shows_settled_vs_estimate_distinctly
    suppression: remove_client_fire_and_forget_accrual_path

