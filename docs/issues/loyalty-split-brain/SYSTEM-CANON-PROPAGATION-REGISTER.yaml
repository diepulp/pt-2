# =============================================================================
# SYSTEM CANON PROPAGATION REGISTER
# =============================================================================
# Source of truth for exemplar propagation status (per SYSTEM-CANON-
# PROPAGATION-MAP-DIRECTIVE.md). Coordinates domain ADRs/PRDs/EXECs; does not
# replace them. Every PRD that introduces a financial/loyalty producer, derived
# value, cache, report consumer, correction path, or new event type MUST cite
# this register and declare affected nodes/edges/disposition/proof (directive §19).
#
# Status:        Proposed (initial system-wide audit)
# Date:          2026-06-21
# Branch:        epson
#
# CORRECTIONS:
#   2026-06-22 (map_version r2): Fixed L-05 crosswalk mis-attribution. The
#     loyalty_liability_slice (rollout next_slice), its proof_obligations comment,
#     and execution_sequence step 6 cited "L-01/02/05". Per fracture_crosswalk
#     (authoritative) L-05 = [loyalty_reversal_rpc, seam_rs_close_accrual], owned by
#     loyalty_phase_2 + rating_slip_seam_cert, and covered by loyalty_balance_reversal_slice.
#     The liability slice's proof obligations are purely valuation (as_of_policy_lookup).
#     Corrected those three references to "L-01/02". No node/edge dispositions changed.
#     Surfaced by GOV-CANON-SHELL-001 §5.1 preflight (SLICE-MANDATE-001).
# Method:        3 parallel authority agents — /tia-canon-authority,
#                /financial-model-authority, /split-brain-authority
# Lane reports:  ./propagation-map/LANE-TIA.md
#                ./propagation-map/LANE-FINANCIAL.md
#                ./propagation-map/LANE-SPLITBRAIN.md
# Diagnosis ref: ./SPLIT-BRAIN-DIAGNOSIS-loyalty.md (L-01..L-15)
# =============================================================================

meta:
  directive: docs/issues/loyalty-split-brain/SYSTEM-CANON-PROPAGATION-MAP-DIRECTIVE.md
  maturity_states: [proven_exemplar, standardized_pattern, propagated_standard]
  governing_sequence: "map -> classify -> select bounded exemplar -> remediate -> certify boundaries -> expand through the map"
  success_condition: "no isolated exemplars surrounded by unmapped legacy behavior"

# -----------------------------------------------------------------------------
# §5.1 CANONICAL PATTERN REGISTRY
# -----------------------------------------------------------------------------
canonical_patterns:

  tia_projection:
    status: standardized_pattern        # CONFIRMED — skill gap-registry stale; PRD-090 is LIVE
    owner: TableContextService.TableInventoryAccounting
    exemplar: PRD-090                    # EXEC-090; SRL-TIA-001 / ADR-059 / ADR-060 / ADR-061
    propagation_status: partial          # per-session converged; aggregate rollup deferred (TODO-WS4)

  transactional_outbox:
    status: standardized_pattern
    owner: finance_outbox
    exemplar: PRD-081                     # GAP-F1 closed (commit 8a1b8741); Wave 2 CLOSED PRD-089
    propagation_status: partial           # producers canonical; render-layer consumers strip envelope; relay prod trigger deviated

  financial_value_surface:
    status: standardized_pattern
    owner: financial_value_envelope       # types/financial.ts:9-17 ; lib/financial/schema.ts:41-49
    exemplar: components/financial/FinancialValue.tsx
    propagation_status: partial           # only entitlement-confirm-panel + outbox observability render labels visibly

  producer_anchor_resolution:
    status: standardized_pattern
    owner: fn_finance_outbox_emit         # casino_id from app.casino_id GUC, never caller-supplied
    propagation_status: partial

  append_only_correction:
    status: proven_exemplar               # ledger immutable EXISTS; loyalty reversal RPC ABSENT (L-05)
    owner: loyalty                        # (finance PFT has the mature instance; loyalty does not)
    propagation_status: incomplete

  temporal_snapshot_rule:
    status: candidate_standard            # pinned for accrual rate; NOT inherited by valuation / avg_bet / balance
    owner: loyalty
    propagation_status: incomplete

# -----------------------------------------------------------------------------
# §5.2 DOMAIN STATUS REGISTRY
# -----------------------------------------------------------------------------
domains:

  loyalty:
    status: active_remediation
    active_program: loyalty_canonization   # SIGP-003 (candidate)
    exemplars_exercised: [temporal_snapshot_rule, append_only_correction, transactional_outbox]

  rating_slip:
    status: contingent_dependency
    reason: >
      Ingress/orchestration boundary for loyalty accrual, finance (PFT/pit-cash),
      telemetry, session lifecycle. Seam certification first; no full canonization
      program authorized yet.
    escalation_preliminary: B_leaning_C    # see rating_slip_escalation below

  player_financial:
    status: partial_propagation
    exemplar: transactional_outbox
    reason: producers canonical; consumers strip FinancialValue envelope at render; relay prod trigger deviated from ADR-056

  table_context:
    status: partial_propagation
    exemplar: table_inventory_accounting
    reason: >
      Per-session TIA vertical converged; aggregate/rollup win-loss deferred (TODO-WS4);
      residual legacy estimated-drop aggregate + dormant table_win_cents remain.

  mtl:
    status: mapped_dependency
    reason: parallel compliance; PFT->MTL derived-only trigger; never emits to finance_outbox; clean one-directional seam

  visit:
    status: mapping
    reason: identity-anchor provider (visitId) + financial-summary consumer; owns no loyalty/financial authority

