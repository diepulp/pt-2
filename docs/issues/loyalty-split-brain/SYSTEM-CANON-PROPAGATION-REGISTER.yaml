  - { from: producer_accrual,                 to: loyalty_outbox,                   relation: should_emit_same_txn,               authority_carried: fact_class, anchor_requirements: "event_id_uuidv7,aggregate_id,casinoId,playerId", transaction_boundary: ABSENT_ledger_only, certification_status: uncertified }
  - { from: rating_slip_close,                to: telemetry,                        relation: pit_cash_observation_estimate,      authority_carried: telemetry_fact, anchor_requirements: "ratingSlipId,visitId", transaction_boundary: client_orchestrated, certification_status: owned_by_tia_lane }

