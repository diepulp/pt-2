legacy_consumer_classification:
  meta:
    prd: PRD-090
    classification_date: 2026-05-30
    classification_agent: parallel-codebase-audit
    purpose: >
      Pre-EXEC inventory of legacy table-result consumers and call sites.
      Prevents PRD-090 execution from rediscovering suppression scope during build.
      Every active operator-visible surface consuming a forbidden legacy table-result
      field or label must be classified before WS5 implementation begins.
    invariant: >
      Active operator-visible surfaces must either consume
      TableInventoryAccountingProjection or suppress legacy table-result rendering.
      No active operator-visible surface may retain forbidden legacy values after the
      exemplar lands.
    exemplar_scope:
      migrated_consumer:
        - Pit Terminal Rundown (components/table/rundown-summary-panel.tsx)
      non_exemplar_consumers:
        rule: suppress_rendering unless separately amended by a subsequent PRD

  forbidden_terms:
    fields:
      - win_loss_inventory_cents
      - win_loss_estimated_cents
      - win_loss_estimated_total_cents
      - win_loss_inventory_total_cents  # discovered: pit/casino-level aggregate of win_loss_inventory_cents; same suppression rule applies
      - estimated_drop_buyins_cents
      - table_win_cents
      - win_loss_cents                  # downstream aggregate of win_loss_inventory_cents in ShiftTableCheckpointDTO/ShiftCheckpointDeltaDTO; forbidden at DTO+API+label level
    labels:
      - "Win/Loss"           # unqualified; "Projected Win/Loss" and "Partial Table Result" are the permitted replacements
      - "Estimated Win/Loss"
      - "Total Drop"
      - "Posted Drop"
      - "Final Win/Loss"
      - "Settled Result"
      - "Reconciled Result"
    forbidden_sources:
      - rpc_shift_table_metrics       # gaming-day scope; COALESCE(SUM,0) — ADR-061 violation
      - rpc_compute_table_rundown     # PATCHED stub; table_win_cents NULL when drop absent; no state discrimination
      - gaming_day_scoped_table_result_formula
      - coalesce_sum_to_zero_for_drop_estimate

  disposition_policy:
    consume_projection:
      allowed_when: >
        The surface is intentionally migrated in PRD-090 to consume
        TableInventoryAccountingProjection.
      expected_for:
        - Pit Terminal Rundown (components/table/rundown-summary-panel.tsx)
    suppress_rendering:
      allowed_when: >
        The surface is active/operator-visible but is not migrated in PRD-090.
      requirement: >
        It must not render or serialize forbidden legacy fields or labels.
        Backing DTO fields may be retained in internal DTO for migration bookkeeping
        only if they are never serialized to the operator-facing API response.
    inactive_or_internal_only_with_reason:
      allowed_when: >
        The usage is deleted, archived, test-only, development-only, or internal
        bookkeeping never returned to an operator-visible boundary.
      forbidden_when: >
        Any operator can see the value in UI, API, export, dashboard, or report.

  # ─────────────────────────────────────────────────────────────────────────────
  # UI COMPONENT CONSUMERS
  # ─────────────────────────────────────────────────────────────────────────────
  consumers:
    - id: LEGACY-CONSUMER-001
      path: components/shift-dashboard/table-metrics-table.tsx
      symbol_or_usage: >
        table.win_loss_inventory_cents (line 277),
        table.win_loss_estimated_cents (line 278) —
        conditional render: if metric_grade === 'AUTHORITATIVE' show inventory cents,
        else show estimated cents; column header "Win/Loss" (line 212)
      legacy_terms_found:
        - win_loss_inventory_cents
        - win_loss_estimated_cents
      visibility: active_operator_visible_ui
      current_behavior: >
        Shift dashboard table-level metrics panel. Renders a "Win/Loss" column that
        conditionally displays either win_loss_inventory_cents or
        win_loss_estimated_cents depending on the metric_grade field.
        Data is driven by ShiftTableMetricsDTO from the shift-dashboard hook.
      disposition: suppress_rendering
      rationale: >
        Active shift dashboard table panel. Not the exemplar migrated consumer.
        The conditional win/loss column uses two forbidden fields and a forbidden
        column label. Must be suppressed before exemplar lands.
      required_prd090_action: >
        Remove or hide the "Win/Loss" column entirely. Do not substitute a local
        formula. Optionally replace with a neutral "Unavailable" placeholder.
        Remove the metric_grade conditional logic for win_loss_inventory_cents /
        win_loss_estimated_cents.
      exec_obligation: code_change_required
      grep_acceptance:
        must_not_render:
          - win_loss_inventory_cents
          - win_loss_estimated_cents
          - '"Win/Loss"'

    - id: LEGACY-CONSUMER-002
      path: components/shift-dashboard/pit-metrics-table.tsx
      symbol_or_usage: >
        pit.win_loss_inventory_total_cents (line 162),
        pit.win_loss_estimated_total_cents (line 165) —
        two side-by-side columns with headers "Win/Loss (Inv)" (line 128) and
        "Win/Loss (Est)" (line 131)
      legacy_terms_found:
        - win_loss_inventory_total_cents
        - win_loss_estimated_total_cents
      visibility: active_operator_visible_ui
      current_behavior: >
        Shift dashboard pit-level rollup table. Renders two adjacent Win/Loss columns:
        inventory-based and estimated, rendered from ShiftPitMetricsDTO.
      disposition: suppress_rendering
      rationale: >
        Active shift dashboard pit panel. Not the exemplar migrated consumer.
        Two forbidden columns with forbidden variants of the "Win/Loss" label.
      required_prd090_action: >
        Remove both "Win/Loss (Inv)" and "Win/Loss (Est)" columns. Do not
        reconstruct locally. Replace with neutral unavailable state or omit entirely.
      exec_obligation: code_change_required
      grep_acceptance:
        must_not_render:
          - win_loss_inventory_total_cents
          - win_loss_estimated_total_cents

    - id: LEGACY-CONSUMER-003
      path: components/shift-dashboard/casino-summary-card.tsx
      symbol_or_usage: >
        data.win_loss_inventory_total_cents (line 212) as KpiCard title
        "Win/Loss (Inventory)", data.win_loss_estimated_total_cents (line 220) as
        KpiCard title "Win/Loss (Estimated)"
      legacy_terms_found:
        - win_loss_inventory_total_cents
        - win_loss_estimated_total_cents
      visibility: active_operator_visible_ui
      current_behavior: >
        Casino-level summary card in shift dashboard. Renders two KpiCards showing
        inventory-method win/loss and estimated win/loss for the casino shift.
        Driven by ShiftCasinoMetricsDTO.
      disposition: suppress_rendering
      rationale: >
        Active casino-level summary surface. Not the exemplar consumer. Both KPI
        cards render forbidden fields with forbidden label variants.
      required_prd090_action: >
        Remove or suppress both "Win/Loss (Inventory)" and "Win/Loss (Estimated)"
        KpiCards. Do not substitute local formula. Consider replacing with a
        neutral "Win/Loss Unavailable" non-value placeholder until a canonical
        casino-level projection consumer is developed in a subsequent PRD.
      exec_obligation: code_change_required
      grep_acceptance:
        must_not_render:
          - win_loss_inventory_total_cents
          - win_loss_estimated_total_cents

    - id: LEGACY-CONSUMER-004
      path: components/pit-panels/analytics-panel.tsx
      symbol_or_usage: >
        tableMetrics.win_loss_inventory_cents (line 164) labeled "Win/Loss",
        tableMetrics.estimated_drop_buyins_cents (line 176) labeled "Estimated Drop" —
        in metrics array rendered to analytics panel metrics list
      legacy_terms_found:
        - win_loss_inventory_cents
        - estimated_drop_buyins_cents
      visibility: active_operator_visible_ui
      current_behavior: >
        Per-table analytics panel in pit view. Renders a metrics list including
        a "Win/Loss" metric (from win_loss_inventory_cents) and an "Estimated Drop"
        metric (from estimated_drop_buyins_cents). Positivity gradient styling uses
        win_loss_inventory_cents >= 0 comparison (line 166).
        Hook: useShiftTableMetrics → ShiftTableMetricsDTO.
      disposition: suppress_rendering
      rationale: >
        Active per-table pit panel. Not the exemplar consumer. Renders both
        a forbidden field and a forbidden label. The positivity logic is also
        derived from a forbidden field.
      required_prd090_action: >
        Remove "Win/Loss" and "Estimated Drop" entries from the metrics array.
        Remove the positivity logic referencing win_loss_inventory_cents.
        Do not compute a local replacement formula.
      exec_obligation: code_change_required
      grep_acceptance:
        must_not_render:
          - win_loss_inventory_cents
          - estimated_drop_buyins_cents

    - id: LEGACY-CONSUMER-005
      path: components/table/rundown-summary-panel.tsx
      symbol_or_usage: >
        rundown.table_win_cents at three render sites:
        (1) winLossVariant useMemo (lines 148-153) — null/positive/negative logic;
        (2) MetricRow value prop (line 335) — conditional label "Table Win"/"Table Loss"/"Win/Loss";
        (3) FinancialValue derivedFrom and value.value (line 350,352) — with value.type='estimated'
      legacy_terms_found:
        - table_win_cents
      visibility: active_operator_visible_ui
      current_behavior: >
        Pit Terminal Rundown surface. Renders table win/loss from table_win_cents
        sourced via rpc_compute_table_rundown (PATCHED stub: null when drop_posted_at
        is null). Cannot discriminate between absent-telemetry and integrity-failure
        states. Shows blank to operator with no disclosure.
      disposition: consume_projection
      rationale: >
        This is the designated Pit Terminal Rundown exemplar consumer. WS4 migrates
        this surface to consume TableInventoryAccountingProjection exclusively.
        The table_win_cents stub and rpc_compute_table_rundown path are fully
        replaced by the canonical three-result-state rendering.
      required_prd090_action: >
        WS4: Replace table_win_cents stub and rpc_compute_table_rundown call with
        TableInventoryAccountingProjection from GET
        /api/v1/table-context/table-sessions/{sessionId}/accounting-projection.
        Render based on calculation_kind discriminator per PRD-090 §4 WS4 spec:
          telemetry_drop_formula → "Projected Win/Loss" + non-custody qualifier
          inventory_only → "Partial Table Result" + missing-telemetry qualifier
          integrity_failure → integrity disclosure only; no result label
        Remove all three render sites for table_win_cents. Remove forbidden labels
        "Win/Loss", "Table Win", "Table Loss".
      exec_obligation: code_change_required

    - id: LEGACY-CONSUMER-006
      path: components/table/rundown-report-card.tsx
      symbol_or_usage: >
        report.table_win_cents (line 83) rendered in grid cell with label "Win/Loss"
        (line 81)
      legacy_terms_found:
        - table_win_cents
      visibility: active_operator_visible_ui
      current_behavior: >
        Rundown report card component — separate from rundown-summary-panel.tsx.
        Renders a "Win/Loss" label and formatCents(report.table_win_cents) in a
        two-column grid. Sourced from RundownReportDTO.
      disposition: suppress_rendering
      rationale: >
        Active operator-visible surface. This is NOT the Pit Terminal Rundown exemplar
        path (that is rundown-summary-panel.tsx). The report card component renders
        the forbidden table_win_cents field with the forbidden "Win/Loss" label.
        Cannot use inactive classification while actively rendering.
      required_prd090_action: >
        Remove or suppress the "Win/Loss" row from the rundown report card grid.
        Do not reconstruct locally. Replace with neutral unavailable state or omit
        the row until a subsequent PRD migrates this report surface.
      exec_obligation: code_change_required
      grep_acceptance:
        must_not_render:
          - table_win_cents
          - '"Win/Loss"'

    - id: LEGACY-CONSUMER-007
      path: components/shift-dashboard-v3/center/metrics-table.tsx
      symbol_or_usage: >
        table.win_loss_estimated_cents (lines 99, 104) passed to FinancialValue
        component with label="Win/Loss"; null check for completeness.status
      legacy_terms_found:
        - win_loss_estimated_cents
      visibility: active_operator_visible_ui
      current_behavior: >
        v3 shift dashboard center panel table-level metrics. Renders a "Win/Loss"
        FinancialValue component backed by win_loss_estimated_cents from
        ShiftTableMetricsDTO.
      disposition: suppress_rendering
      rationale: >
        Active v3 shift dashboard operator surface. Not the exemplar consumer.
        Renders forbidden field with forbidden label.
      required_prd090_action: >
        Remove Win/Loss FinancialValue entry from the v3 metrics table.
        Do not recompute from raw fields.
      exec_obligation: code_change_required
      grep_acceptance:
        must_not_render:
          - win_loss_estimated_cents

    - id: LEGACY-CONSUMER-008
      path: components/shift-dashboard-v3/center/pit-table.tsx
      symbol_or_usage: >
        pit.win_loss_estimated_total_cents (line 54) in FinancialValue with
        label="Win/Loss"; table header "Win/Loss" (line 118)
      legacy_terms_found:
        - win_loss_estimated_total_cents
      visibility: active_operator_visible_ui
      current_behavior: >
        v3 shift dashboard pit-level table. Renders "Win/Loss" FinancialValue
        backed by win_loss_estimated_total_cents from ShiftPitMetricsDTO.
      disposition: suppress_rendering
      rationale: >
        Active v3 pit-level dashboard surface. Not the exemplar consumer.
      required_prd090_action: >
        Remove Win/Loss FinancialValue from v3 pit table. Remove "Win/Loss" column
        header.
      exec_obligation: code_change_required
      grep_acceptance:
        must_not_render:
          - win_loss_estimated_total_cents

    - id: LEGACY-CONSUMER-009
      path: components/shift-dashboard-v3/shift-dashboard-v3.tsx
      symbol_or_usage: >
        summary?.casino?.win_loss_estimated_total_cents (line 197) passed as
        winLossCents prop to HeroWinLossCompact component
      legacy_terms_found:
        - win_loss_estimated_total_cents
      visibility: active_operator_visible_ui
      current_behavior: >
        v3 shift dashboard root component. Passes casino-level
        win_loss_estimated_total_cents to HeroWinLossCompact in the left rail.
      disposition: suppress_rendering
      rationale: >
        Prop pass-through that feeds a forbidden value into an operator-visible
        hero component. Suppression here must prevent the value from reaching
        HeroWinLossCompact (LEGACY-CONSUMER-011).
      required_prd090_action: >
        Stop passing win_loss_estimated_total_cents to HeroWinLossCompact.
        Pass null or undefined to the winLossCents prop, or remove the prop
        entirely if HeroWinLossCompact is also suppressed.
      exec_obligation: code_change_required

    - id: LEGACY-CONSUMER-010
      path: components/shift-dashboard-v3/charts/win-loss-trend-chart.tsx
      symbol_or_usage: >
        pit.win_loss_estimated_total_cents (line 111) mapped to chartData.winLoss;
        "Win/Loss" in chart configuration labels (line 29, 57, 98, 117, 129), ARIA
        text (line 158) — 6 occurrences
      legacy_terms_found:
        - win_loss_estimated_total_cents
      visibility: active_operator_visible_ui
      current_behavior: >
        v3 shift dashboard Win/Loss trend chart. Transforms pit data into chart
        series with winLoss: pit.win_loss_estimated_total_cents. All chart labels,
        axis names, tooltip labels, and ARIA text use the forbidden "Win/Loss" string.
      disposition: suppress_rendering
      rationale: >
        Active operator-visible chart surface. Not the exemplar consumer. Renders
        forbidden field in chart and uses forbidden label string in 6 places.
      required_prd090_action: >
        Remove or suppress the Win/Loss data series from the trend chart.
        Remove all "Win/Loss" label strings from chart configuration, axis,
        tooltip, and ARIA text. Do not substitute local computation.
        The chart may be hidden entirely until a subsequent PRD defines a
        canonical replacement metric.
      exec_obligation: code_change_required
      grep_acceptance:
        must_not_render:
          - win_loss_estimated_total_cents
          - '"Win/Loss"'

    - id: LEGACY-CONSUMER-011
      path: components/shift-dashboard-v3/left-rail/hero-win-loss-compact.tsx
      symbol_or_usage: >
        winLossCents prop receives win_loss_estimated_total_cents from parent
        (LEGACY-CONSUMER-009); renders "Win/Loss" label at lines 61, 87, 94
      legacy_terms_found:
        - label "Win/Loss" (3 occurrences)
      visibility: active_operator_visible_ui
      current_behavior: >
        v3 left-rail hero Win/Loss component. Receives casino-level win/loss value
        via prop and renders it prominently with "Win/Loss" label.
      disposition: suppress_rendering
      rationale: >
        Active operator-visible hero component receiving a forbidden value from
        LEGACY-CONSUMER-009. The component itself renders the forbidden label.
        Suppression at the parent (LEGACY-CONSUMER-009) plus label removal here
        together close this surface.
      required_prd090_action: >
        Remove the "Win/Loss" label strings at lines 61, 87, and 94 — all three
        sites render the label unconditionally, including in the null-value state,
        so suppressing the prop value alone is insufficient. Either remove the
        component from the render tree entirely, or remove all three label
        occurrences and ensure the component renders nothing in the null state.
        Do not substitute a local formula or a different forbidden label.
      exec_obligation: code_change_required

    - id: LEGACY-CONSUMER-012
      path: components/reports/shift-report/sections/executive-summary.tsx
      symbol_or_usage: >
        "Win/Loss" KPI label (lines 75, 79) — backed by winLossInventoryCents /
        winLossEstimatedCents mapped by shift-report assembler
      legacy_terms_found:
        - label "Win/Loss"
      visibility: active_operator_visible_ui
      current_behavior: >
        Shift report executive summary section. Renders a "Win/Loss" KPI metric
        sourced from the shift-report assembler which maps win_loss_inventory_cents
        and win_loss_estimated_cents.
      disposition: suppress_rendering
      rationale: >
        Active operator-visible report surface. Not the exemplar consumer. The
        "Win/Loss" KPI label is forbidden and the backing value is derived from
        a forbidden source via the report assembler (LEGACY-API-007).
      required_prd090_action: >
        Remove the "Win/Loss" KPI from the executive summary section. Do not
        substitute a local formula. If a canonical replacement is desired, that
        requires a subsequent PRD to wire TableInventoryAccountingProjection
        into the report assembler path.
      exec_obligation: code_change_required

    - id: LEGACY-CONSUMER-013
      path: components/reports/shift-report/sections/financial-summary.tsx
      symbol_or_usage: >
        "Win/Loss" table header (line 74) — backed by shift-report assembler
        winLoss facts
      legacy_terms_found:
        - label "Win/Loss"
      visibility: active_operator_visible_ui
      current_behavior: >
        Shift report financial summary section. Renders a table column with
        "Win/Loss" header backed by assembler-mapped legacy fields.
      disposition: suppress_rendering
      rationale: >
        Active operator-visible report surface. Not the exemplar consumer.
        Forbidden "Win/Loss" header label.
      required_prd090_action: >
        Remove or suppress "Win/Loss" column from financial summary table.
        Update assembler suppression in LEGACY-API-007 to not propagate
        the legacy field to this section.
      exec_obligation: code_change_required

    - id: LEGACY-CONSUMER-014
      path: components/shift-intelligence/anomaly-alert-card.tsx
      symbol_or_usage: >
        win_loss_cents: 'Win/Loss' label map entry (line 70) — maps the
        ShiftTableCheckpointDTO.win_loss_cents metric key to the display label
        "Win/Loss" in anomaly alert cards
      legacy_terms_found:
        - label "Win/Loss" (via label map)
      visibility: active_operator_visible_ui
      current_behavior: >
        Anomaly alert card component. When an anomaly is detected for the
        win_loss_cents metric (ShiftTableCheckpointDTO field derived from
        win_loss_inventory_cents — see LEGACY-API-008), the card displays the
        forbidden "Win/Loss" label. Operator-visible through shift-intelligence
        anomaly alert surfaces.
      disposition: suppress_rendering
      rationale: >
        Active operator-visible anomaly alert surface. The win_loss_cents field
        in ShiftTableCheckpointDTO is derived from the forbidden
        win_loss_inventory_cents via aggregation (shift-checkpoint/crud.ts:143).
        The label "Win/Loss" is forbidden. Must not expose this metric to operators
        with the forbidden label after the exemplar lands.
      required_prd090_action: >
        Remove win_loss_cents from the anomaly alert label map (line 70).
        Suspend the anomaly detection logic for the win_loss_cents metric: since
        LEGACY-API-008 removes win_loss_cents from ShiftTableCheckpointDTO, any
        detection threshold check against this field will produce zero alerts (field
        absent → null → no threshold breach) or a runtime error. Suspending the
        detection explicitly — rather than relying on the null fallthrough — makes
        the intent clear and prevents phantom alert suppression. Record the
        suspension in the WS5 inventory. A canonical replacement anomaly detector
        for table result metrics is deferred to a subsequent PRD that wires
        TableInventoryAccountingProjection into the shift-intelligence pipeline.
      anomaly_detection_suspension: >
        DECIDED: suspend win_loss_cents anomaly detection at WS5 commit time.
        Rationale: LEGACY-API-008 removes the source field from the DTO; silent
        null-through is not an acceptable substitute for an explicit decision.
      exec_obligation: code_change_required

  # ─────────────────────────────────────────────────────────────────────────────
  # API ROUTES AND DTO SURFACES
  # ─────────────────────────────────────────────────────────────────────────────
  api_and_dto_surfaces:
    - id: LEGACY-API-001
      path: services/table-context/shift-metrics/dtos.ts
      exported_field_or_response: >
        ShiftTableMetricsDTO fields:
          win_loss_inventory_cents: number | null (line 109)
          win_loss_estimated_cents: number | null (line 111)
          estimated_drop_buyins_cents: number (line 103)
      consumed_by:
        - components/shift-dashboard/table-metrics-table.tsx (LEGACY-CONSUMER-001)
        - components/pit-panels/analytics-panel.tsx (LEGACY-CONSUMER-004)
        - components/shift-dashboard-v3/center/metrics-table.tsx (LEGACY-CONSUMER-007)
        - hooks/shift-dashboard/use-shift-table-metrics.ts
        - hooks/dashboard/use-exceptions-data.ts
        - services/table-context/shift-checkpoint/crud.ts (aggregation source)
      visibility: serialized_operator_facing_api
      disposition: suppress_rendering
      rationale: >
        ShiftTableMetricsDTO is the DTO type for the operator-facing API route
        app/api/v1/shift-dashboards/metrics/tables (LEGACY-API-006). It carries
        three forbidden fields that flow directly to operator-visible components.
        Fields must be removed from the DTO or excluded from the API serialization
        boundary before PRD-090 lands.
      required_prd090_action: >
        Remove win_loss_inventory_cents, win_loss_estimated_cents, and
        estimated_drop_buyins_cents from ShiftTableMetricsDTO. Update all consuming
        components to suppress rendering per their individual LEGACY-CONSUMER
        classifications. Update the API route to not return these fields.
      exec_obligation: code_change_required

    - id: LEGACY-API-002
      path: services/table-context/dtos.ts
      exported_field_or_response: >
        TableRundownDTO field: table_win_cents: number | null (line 657)
      consumed_by:
        - components/table/rundown-summary-panel.tsx (LEGACY-CONSUMER-005 — exemplar)
        - hooks/table-context/use-table-rundown.ts
        - app/api/v1/table-sessions/[id]/rundown route
      visibility: serialized_operator_facing_api
      disposition: consume_projection
      rationale: >
        TableRundownDTO.table_win_cents is the source for the Pit Terminal Rundown
        exemplar. WS4 migrates rundown-summary-panel.tsx to consume
        TableInventoryAccountingProjection instead. After WS4, table_win_cents may
        be retained in the DTO for migration bookkeeping only if it is never
        serialized to the operator-facing API response.
      required_prd090_action: >
        WS4: Replace the /rundown API route's reliance on rpc_compute_table_rundown
        and table_win_cents with TableInventoryAccountingProjection. After WS4:
        if table_win_cents is retained in the DTO for non-exemplar paths, it must
        not be returned on any active operator-visible API boundary.
      exec_obligation: code_change_required

    - id: LEGACY-API-003
      path: services/table-context/rundown-report/dtos.ts
      exported_field_or_response: >
        RundownReportTableDTO: table_win_cents: number | null (line 45)
        RundownReportCasinoDTO: table_win_cents: number | null (line 68)
      consumed_by:
