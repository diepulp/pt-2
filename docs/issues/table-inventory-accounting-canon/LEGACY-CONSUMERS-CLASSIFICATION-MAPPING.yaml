      visibility: serialized_operator_facing_api
      disposition: suppress_rendering
      rationale: >
        RundownReport DTOs contain table_win_cents and back an operator-visible
        report card surface. This is NOT the Pit Terminal Rundown exemplar path
        (that is rundown-summary-panel.tsx via /table-sessions/[id]/rundown).
        The rundown report card must suppress rendering of table_win_cents.
      required_prd090_action: >
        Remove table_win_cents from serialized API response of
        app/api/v1/table-rundown-reports/[id]. Remove from RundownReport DTOs or
        mark as not-serialized. Update LEGACY-CONSUMER-006 per its suppression action.
      exec_obligation: code_change_required

    - id: LEGACY-API-004
      path: services/table-context/shift-metrics/dtos.ts
      exported_field_or_response: >
        ShiftPitMetricsDTO fields:
          win_loss_estimated_total_cents: number | null (line 175)
          win_loss_inventory_total_cents: number | null (line 173)
      consumed_by:
        - components/shift-dashboard/pit-metrics-table.tsx (LEGACY-CONSUMER-002)
        - components/shift-dashboard-v3/center/pit-table.tsx (LEGACY-CONSUMER-008)
        - hooks/shift-dashboard/http.ts (pits endpoint)
        - app/api/v1/shift-dashboards/metrics/pits route
      visibility: serialized_operator_facing_api
      disposition: suppress_rendering
      rationale: >
        ShiftPitMetricsDTO carries both aggregate forbidden fields. Serialized to
