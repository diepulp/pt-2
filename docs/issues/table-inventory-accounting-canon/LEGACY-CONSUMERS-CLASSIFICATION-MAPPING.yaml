        - components/table/rundown-summary-panel.tsx (via use-table-rundown.ts)
      issue: >
        PATCHED behavior: table_win_cents is NULL when drop_posted_at is null.
        No discrimination between absent-telemetry (should produce partial_table_result_cents)
        and integrity-failure (opener or closer unresolvable). Operator sees opaque blank.
      disposition: >
        WS4 removes rpc_compute_table_rundown from the exemplar render path entirely.
        Post-WS4: if retained for non-exemplar callers (e.g., archived report paths),
        the RPC must be quarantined from all active operator-visible paths per
        PRD-090 §7.2 R3. Retention as dead/internal-only code requires tests proving
        no active caller consumes table_win_cents from it.
      required_prd090_action: >
        WS4: Replace rpc_compute_table_rundown call in rundown.ts with
        TableInventoryAccounting service call. After WS4: EXEC decides whether to
        drop the RPC entirely or quarantine. If quarantined, add test proving no
        active operator path calls it.
      exec_obligation: code_change_required

    - id: LEGACY-RPC-002
      path: services/table-context/shift-metrics/service.ts
      rpc_or_query: rpc_shift_table_metrics
      active_call_site: line 44 — supabase.rpc('rpc_shift_table_metrics', { ... })
      used_by:
        - ShiftTableMetricsDTO production (all consumers: LEGACY-CONSUMER-001/004/007)
        - services/table-context/shift-checkpoint/crud.ts:141 (win_loss_inventory_cents aggregation)
        - All shift dashboard surfaces via cascaded DTO fields
      issue: >
        (a) Uses gaming-day scope instead of session scope — ADR-061 violation.
        (b) COALESCE(SUM(...), 0) silently treats zero qualifying telemetry rows as
        zero telemetry-derived drop estimate — ADR-061 D6 violation.
        Must NOT be used as source for TableInventoryAccounting.telemetry_derived_drop_estimate_cents.
      disposition: >
        Must not be used in the canonical TableInventoryAccounting service path.
        Shift dashboard consumers must suppress rendering of all fields derived
        from this RPC per LEGACY-API-001/004/005 classifications. The service
        call itself may remain for backward-compatible shift dashboard operations
        during the suppression transition, but the fields it produces must not
        appear in any operator-facing API response or rendered UI after WS5.
      required_prd090_action: >
        WS5: Remove win_loss_inventory_cents, win_loss_estimated_cents,
        win_loss_estimated_total_cents, win_loss_inventory_total_cents, and
        estimated_drop_buyins_cents from all DTOs and API responses that
        consume this RPC's output. The RPC call site itself does not need to
        be deleted in PRD-090 scope if other non-forbidden fields (e.g.,
        fills_total_cents, telemetry_quality) remain in active legitimate use.
      exec_obligation: code_change_required

    - id: LEGACY-RPC-003
      path: supabase/migrations/20260114004336_rpc_shift_table_metrics.sql
      rpc_or_query: rpc_shift_table_metrics (SQL definition)
      used_by:
        - LEGACY-RPC-002 call site
      issue: >
        Line 244: COALESCE(ta.total_cents, 0)::bigint AS estimated_drop_buyins_cents
        — forbidden COALESCE-to-zero pattern (ADR-061 D6 violation).
        Gaming-day window in query (not session-scope). This is the DB-level source
        of all ADR-061 violations in the shift-metrics stream.
      disposition: inactive_or_internal_only_with_reason
      rationale: >
        SQL migration file is a DB artifact defining the legacy RPC. The migration
        itself is not an operator-visible consumer surface. The WS2 implementation
        creates a new canonical service (table-inventory-accounting.ts) with the
        correct session-scope predicate. The legacy RPC definition remains in the DB
        until formally dropped; dropping it is an EXEC decision.
      required_prd090_action: >
        No schema migration required in PRD-090 scope to change this definition.
        EXEC decides whether to drop the legacy RPC in a subsequent migration.
        WS6 tia.rpc_exclusion test must prove TableInventoryAccounting does not
        call rpc_shift_table_metrics.
      exec_obligation: documentation_and_gate_only

    - id: LEGACY-RPC-004
      path: supabase/migrations/20260114004455_rpc_shift_rollups.sql
      rpc_or_query: rpc_shift_pit_metrics + rpc_shift_casino_metrics (SQL definitions)
      used_by:
        - Pit and casino level shift metrics (ShiftPitMetricsDTO, ShiftCasinoMetricsDTO)
      issue: >
        Lines 138-139 (pit): COALESCE(SUM(tm.win_loss_inventory_cents), 0)::bigint
        Lines 261-262 (casino): COALESCE(SUM(tm.win_loss_inventory_cents), 0)::bigint
        — rollup aggregation with COALESCE masking of missing snapshot data.
        Both functions call rpc_shift_table_metrics() internally, inheriting its
        gaming-day scope violation.
      disposition: inactive_or_internal_only_with_reason
      rationale: >
        SQL migration defining legacy rollup RPCs. Not directly an operator-visible
        consumer surface. The COALESCE masking is an internal DB computation artifact.
        Services calling these RPCs are classified separately (LEGACY-API-004/005).
      required_prd090_action: >
        No schema migration required in PRD-090 scope. Service-level suppression
        (LEGACY-API-004/005) closes the operator-visible exposure. EXEC may choose
        to drop these RPCs in a subsequent migration.
      exec_obligation: documentation_and_gate_only

