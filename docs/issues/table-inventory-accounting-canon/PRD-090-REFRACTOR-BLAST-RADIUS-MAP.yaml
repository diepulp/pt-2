final_recommendation:

  safe_to_draft_exec_when:
    - direct_in_scope is unchanged and narrow (exemplar + suppression only)
    - ADR-059, ADR-060, ADR-061 all confirmed Accepted (DONE as of 2026-05-29)
    - SRM table_buyin_telemetry ownership gap resolved in WS1
    - SRL snapshot role binding patched to open/close lowercase
    - idx_tbt_kind existence verified by WS1
    - chipset_total_cents() function availability confirmed
    - all five outbox posture checks answered (OUTBOX-CHECK-001 through 005)
    - all four unresolved route.ts files inspected and classified
    - every active legacy consumer has exactly one disposition
    - uppercase snapshot fossil vocabulary (OPENING/CLOSING/snapshot_kind) removed from all artifacts
    - stop conditions acknowledged and incorporated into EXEC scaffold

  not_safe_to_draft_exec_when:
    - any consumed input (table_buyin_telemetry, fills, credits, snapshots) depends
      on unfinished Wave 2 outbox propagation or relay work
    - any active operator-visible surface or API lacks a suppression or projection disposition
    - implementation would need to invent bridge_pending behavior at runtime
    - outbox, relay, or projection-store work is needed to make the exemplar function
    - chipset_total_cents() is unavailable and null total_cents snapshots exist in production
    - four unresolved route inspections remain open at WS5 commit time

  containment_posture: >
    PRD-090 is a narrow exemplar. Its blast radius is bounded. The suppression inventory
    is substantially complete. The schema vocabulary is corrected through DA-004.
    The primary remaining risks are: (1) the four uninspected route.ts files that may
    independently serialize forbidden fields, (2) the outbox posture checks that must
    confirm table_buyin_telemetry rows are stable and queryable, and (3) the
    chipset_total_cents() function dependency introduced by DA-004. None of these
    require expanding PRD-090's scope — they require verification before EXEC commits begin.
