      pass_condition: >
        snapshot_type enforced values are exactly: open, close, rundown.
        Opener maps to snapshot_type = 'open'.
        Closer maps to snapshot_type = 'close'.
        No uppercase OPENING or CLOSING values may exist or be queried.
