# ─────────────────────────────────────────────────────────────────────────────
# CORE INVARIANT
# ─────────────────────────────────────────────────────────────────────────────
core_invariant: >
  PRD-090 may implement a narrow read-time exemplar only if its consumed inputs
  are stable enough to support TableInventoryAccounting without hidden producer,
  outbox, relay, bridge, or projection-consumer work. If implementation discovers
  that table_buyin_telemetry, fills, credits, or inventory snapshot row presence
  depends on unfinished financial outbox, relay, bridge, or projection-consumer
  work, PRD-090 must pause and emit a dependency finding instead of patching
  around it.

# ─────────────────────────────────────────────────────────────────────────────
# SCOPE MODEL
# ─────────────────────────────────────────────────────────────────────────────
scope_model:

  direct_in_scope:
    - item: TableInventoryAccounting service module
      target_file: services/table-context/table-inventory-accounting.ts
      reason: >
        Canonical read-time derivation owner. Sole location where a win/loss-like
        table result may be computed. No competing formula may survive.
      expected_action: implement
      workstream: WS2

    - item: TableInventoryAccountingProjection DTO
      reason: >
        Sole downstream table-result authority. Frozen minimum contract defined
        in ADR-059 D3 (amended by ADR-060 D3: snapshots key, not inventory key).
        final_table_win_loss_cents always null in this slice.
      expected_action: implement
      workstream: WS2

    - item: Accounting projection API route
      target_route: GET /api/v1/table-context/table-sessions/{sessionId}/accounting-projection
      reason: >
        BFF/API boundary for exemplar consumer. No formula logic in route handler.
        No call to rpc_shift_table_metrics. RLS via set_rls_context_from_staff().
      expected_action: implement
      workstream: WS3

    - item: Pit Terminal Rundown wiring
      target_file: components/table/rundown-summary-panel.tsx
      reason: >
        First canonical consumer. Replaces table_win_cents stub and
        rpc_compute_table_rundown. Renders three result states per calculation_kind.
        No surface-side recomputation from raw fields.
      expected_action: consume_projection
      workstream: WS4

    - item: SRM table_buyin_telemetry ownership gap resolution
      target_doc: docs/20-architecture/SERVICE_RESPONSIBILITY_MATRIX.md
      reason: >
        TableContextService must declare table_buyin_telemetry as a consumed
        input for TableInventoryAccounting.telemetry_derived_drop_estimate_cents.
        The gap is explicitly flagged in PRD-090 §7.1. Must resolve before WS2.
      expected_action: patch_srm
      workstream: WS1

    - item: Active legacy render and API suppression
      reason: >
        Fourteen active operator-visible UI consumers and eight API/DTO surfaces
        classified in LEGACY-CONSUMERS-CLASSIFICATION-MAPPING.yaml must either
        consume the projection or suppress rendering and serialization before
        exemplar lands. See consumers inventory for per-surface obligations.
      expected_action: suppress_or_verify_absent
      workstream: WS5
      consumer_counts:
        active_operator_visible_ui: 14  # LEGACY-CONSUMER-001 through 014
        api_and_dto_surfaces: 10        # LEGACY-API-001 through 010 (LEGACY-API-009/010 added by BLOCKER-1 patch 2026-05-30)
        rpc_and_query_sources: 4        # LEGACY-RPC-001 through 004
        consume_projection: 2           # LEGACY-CONSUMER-005 + LEGACY-API-002
        suppress_rendering: 20          # all non-exemplar active surfaces (18 + LEGACY-API-009 + LEGACY-API-010)
        unresolved_requiring_inspection: 0  # UNRESOLVED-001/002 → LEGACY-API-009/010; UNRESOLVED-003/004 → CLEAN (2026-05-30)

    - item: Automated suppression gate
      reason: >
        Grep/test gate that fails CI if active operator-visible code or serialized
        operator-facing API responses contain forbidden legacy render fields or labels.
        Required as tia.active_surface_suppression_gate and
        tia.shift_metric_api_suppression test suites per WS5/WS6.
      expected_action: implement
      workstream: WS5_WS6

    - item: WS6 test harness
      reason: >
        Fourteen required test IDs covering DTO contract, five-operand formula,
        inventory-side derivation, snapshot resolution, null-vs-zero,
        RATED_ADJUSTMENT exclusion, session-scope-only, rpc_exclusion,
        integrity_failure suppression, consumer render-only, tenant isolation,
        role matrix, active-surface suppression gate, shift metric API suppression.
      expected_action: implement
      workstream: WS6

  # ─────────────────────────────────────────────────────────────────────────────
  # REQUIRED PREFLIGHT
  # ─────────────────────────────────────────────────────────────────────────────
  required_preflight:

    - item: ADR-059, ADR-060, ADR-061 status verification
      owner: architecture
      required_before: EXEC
      current_status: CLOSED — all three accepted as of 2026-05-29
      pass_condition: >
        ADR-059, ADR-060, ADR-061 all have status: Accepted. No provisional
        or draft ADR in the authority stack.
      fail_action: block_EXEC_until_all_three_accepted

    - item: SRM table_buyin_telemetry consumed-input patch
      owner: architecture
      required_before: WS2
      current_status: OPEN — flagged as unresolved ownership gap in SRM and PRD-090 §7.1
      pass_condition: >
        SRM TableContextService section declares table_buyin_telemetry as a
        consumed input for TableInventoryAccounting.telemetry_derived_drop_estimate_cents.
        SRM no longer marks this as an unresolved ownership gap after WS1 exits.
      fail_action: pause_WS2_until_srm_patch_committed

    - item: table_inventory_snapshot schema vocabulary verification
      owner: backend
