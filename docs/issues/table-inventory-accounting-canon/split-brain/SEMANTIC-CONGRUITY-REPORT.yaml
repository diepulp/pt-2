executive_verdict:
  verdict: patch_required_before_PRD
  rationale: >
    The ADR set (059 · 060 · 061) is internally coherent. Two P1 semantic cracks
    require targeted patches before the PRD may proceed. The ADR-level RATED_ADJUSTMENT
    exclusion is correct; no artifact falsely claims RATED_ADJUSTMENT is schema-absent
    or structurally blocked. The three-result-state model, null-vs-zero invariant,
    session-scope boundary, and custody-status invariant are consistent across all artifacts.
  p1_cracks_blocking_prd:
    - id: CRACK-001
      term: "Estimated Win/Loss (surface label)"
      artifact: UL Baseline §Surface rendering rules; Classification YAML allowed_surface_labels
      summary: >
        ADR-060 D4 removes "Estimated Win/Loss" from the allowed list.
        UL Baseline and Classification YAML still permit it as an acceptable alternative.
    - id: CRACK-002
      term: source_authority.inventory (DTO key)
      artifact: ADR-059 D3
      summary: >
        ADR-059 D3 defines source_authority.inventory; ADR-060 D3 supersedes with
        source_authority.snapshots. ADR-059 not inline-amended.
        TIA-CANON-SOURCE-AUTHORITY-SHAPE acceptance test fails against ADR-059 as written.
  p2_gaps_recommended:
    - id: CRACK-003
      summary: Classification YAML estimated_drop_cents status is acceptable_with_label; ADR-060 demotes to deprecated_alias
    - id: CRACK-004
      summary: RATED_ADJUSTMENT exclusion absent from UL Baseline and Classification YAML; only in ADR-060/061
    - id: CRACK-005
      summary: UL Baseline names field input_completeness (two values); ADR-059 nests as completeness.status (three values)
  p0_gate_open:
    gate: dashboard_suppression_gate
    source: Classification YAML prd_gate_patches
    requirement: >
      Exemplar PRD must include a suppression inventory of every active operator-visible
      win/loss-like surface, with verified disposition for each. Not a crack in the ADR set —
      a PRD acceptance criterion that must be written before implementation begins.

