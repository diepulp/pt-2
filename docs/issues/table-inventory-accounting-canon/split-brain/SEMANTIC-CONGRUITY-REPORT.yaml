      database_internal: true
      dto_api: false
      operator_surface: false
      future_reserved: false
    source_authority: table_buyin_telemetry
    custody_posture: non_custody_estimate
    drift: false
    required_patch: none

  - term: RATED_ADJUSTMENT
    canonical_definition: >
      Non-canonical for telemetry_derived_drop_estimate_cents in this slice.
      May exist in legacy/current telemetry paths. Excluded by semantic decision,
      NOT by schema absence. Must not contribute to canonical session-scoped SUM,
      must not change drop_estimate_state, must not affect projected_table_win_loss_cents.
    artifact_usage:
      ADR-060_D2: >
        explicitly excluded — "semantic exclusion, not a claim that the value is absent
        from the current database schema"; current legacy/shift-metrics paths may contain it
      ADR-061_D2: >
        "intentionally absent from this predicate. Its absence is a canonical exemplar
        decision, not an assertion that legacy/current schema paths cannot contain that value."
      UL_Baseline: silent — no mention of RATED_ADJUSTMENT (P2 gap)
      Classification_YAML: silent (P2 gap)
      Scaffold_§4: predicate omits RATED_ADJUSTMENT without explanation (P2 gap)
    status: excluded_non_canonical
    boundary_allowed:
      database_internal: false  # must not enter canonical SUM
      dto_api: false
      operator_surface: false
      future_reserved: false
    drift: true
    drift_severity: P2
    conflicting_artifacts:
      - UL Baseline silent; no exclusion statement
      - Classification YAML silent; no exclusion statement
      - Scaffold predicate omits without rationale note
      - ADR-060 D2 and ADR-061 D2 correctly exclude with rationale
    required_patch: >
      (1) UL Baseline canonical drop taxonomy table: add RATED_ADJUSTMENT row with status
      "non-canonical / excluded" and note consistent with ADR-060 D2.
      (2) Classification YAML telemetry source resolution block: add sentence naming
      RATED_ADJUSTMENT exclusion.
      (3) Scaffold §4 telemetry predicate comment: add
      "-- RATED_ADJUSTMENT intentionally excluded per ADR-060 D2; may exist in legacy paths."

  - term: table_buyin_telemetry
    canonical_definition: >
      The read source table. Session-scoped SUM produces telemetry_derived_drop_estimate_cents.
      Owned by TableContextService. Column telemetry_kind verified against DDL
      (20260114003530_table_buyin_telemetry.sql).
    artifact_usage:
      UL_Baseline: approved source
      Scaffold_§4: frozen predicate references this table; column verified
      ADR-059: delegates source binding to ADR-061
      ADR-060_D2: kind enumeration applies to rows in this table
      ADR-061_D2: frozen predicate targets this table
    status: canonical_source
    drift: false
    required_patch: none

  - term: rpc_shift_table_metrics
    canonical_definition: >
      EXCLUDED as source for telemetry_derived_drop_estimate_cents.
      Wrong scope (gaming-day, not session-scoped) and applies forbidden COALESCE(SUM, 0).
      Must not be called by TableInventoryAccounting for telemetry aggregation.
    artifact_usage:
      ADR-061_D5: explicitly excluded with two disqualifying properties
      Classification_YAML: identifies as implementation gap
      Scaffold_§7: confirmed gap
    status: excluded_source
    drift: false
    required_patch: none

  - term: rpc_compute_table_rundown
    canonical_definition: >
      BFF RPC. Has no telemetry aggregation in current implementation.
      Must be updated to call TableInventoryAccountingService.deriveProjection().
      Not an excluded source — it is the update target.
    artifact_usage:
      ADR-061_D5: not excluded; is the BFF route update target
      Scaffold_§7: dependency; needs canonical formula wired
    status: dependency_update_target
    drift: false
    required_patch: none

  - term: gaming_day
    canonical_definition: >
      Lifecycle metadata on table_session. Set by trigger via compute_gaming_day(opened_at, ...).
      Must NEVER be used as an aggregation window bound for telemetry_derived_drop_estimate_cents.
      May appear as an identity/context field in the DTO.
    artifact_usage:
      ADR-061_D4: lifecycle metadata only; not a scope boundary
      Classification_YAML: consistent; gaming-day scope forbidden
      Scaffold_§11: consistent
    status: canonical_lifecycle_metadata
    boundary_allowed:
      database_internal: true  # as identity field in table_session
      dto_api: true  # as identity/context field in TableInventoryAccountingProjection
      operator_surface: false  # not rendered as a result value
      future_reserved: false
    drift: false
    required_patch: none

  - term: session_scope
    canonical_definition: >
      Canonical and exclusive aggregation boundary for telemetry_derived_drop_estimate_cents.
      occurred_at >= opened_at AND occurred_at < COALESCE(closed_at, NOW()).
      Gaming-day scope is explicitly forbidden for this field.
    artifact_usage:
      ADR-061_D1: canonical and exclusive; gaming-day scope forbidden
      ADR-061_D2: frozen predicate
      Classification_YAML: resolved 2026-05-27
      Scaffold_§4: frozen predicate
    status: canonical_exclusive_scope
    drift: false
    required_patch: none

  - term: source_authority
    canonical_definition: >
      Object carrying origin metadata for each significant input.
      Authoritative shape (ADR-060 D3):
        drop: 'telemetry_derived_estimate' | 'none'
        snapshots: 'table_inventory_snapshot'
        fills: 'table_fill'
        credits: 'table_credit'
      No 'inventory' key may exist.
    artifact_usage:
      ADR-059_D3: "defines source_authority.inventory — SUPERSEDED by ADR-060 D3"
      ADR-060_D3: corrects to source_authority.snapshots; explicitly supersedes ADR-059 D3
      Acceptance_test: requires snapshots key; inventory key must be absent
    status: canonical_corrected_shape
    boundary_allowed:
      database_internal: false
      dto_api: true  # required on every TableInventoryAccountingProjection
      operator_surface: false
      future_reserved: false
    drift: true
    drift_severity: P1
    conflicting_artifacts:
      - ADR-059 D3 still defines source_authority.inventory key (wrong)
      - ADR-060 D3 corrects to source_authority.snapshots (right)
      - ADR-059 D3 not inline-amended to reflect this correction
    required_patch: >
      ADR-059 D3 source_authority TypeScript interface block: replace
      "inventory: 'table_inventory_snapshot'" with "snapshots: 'table_inventory_snapshot'".
      Add inline comment: "// KEY AMENDED: 'inventory' → 'snapshots' per ADR-060 D3."
      Add section header note: "D3 source_authority shape is amended by ADR-060 D3.
      The inventory key no longer exists; the authoritative key is snapshots."

  - term: custody_status
    canonical_definition: >
      Axis declaring whether value is custody-final.
      Always 'non_custody_estimate' in this slice.
      'external_custody_authoritative' is unreachable without external integration.
      input_completeness = complete never upgrades custody_status.
    artifact_usage:
      UL_Baseline: two-axis invariant; non_custody_estimate always
      Classification_YAML: semantic_invariant; non_custody_estimate always
      ADR-059_D3: always non_custody_estimate in this slice
    status: canonical
    boundary_allowed:
      database_internal: true
      dto_api: true
      operator_surface: false
      future_reserved: false
    drift: false
    required_patch: none

  - term: input_completeness
    canonical_definition: >
      UL Baseline field name for completeness axis. Structural naming diverges from
      ADR-059 D3 which uses completeness.status with three values (complete/partial/integrity_failure).
      ADR-059 D3 is the authoritative DTO contract.
    artifact_usage:
      UL_Baseline: "top-level field input_completeness; values: complete | partial only (P2 gap)"
      ADR-059_D3: "nested as completeness.status; values: complete | partial | integrity_failure"
    status: ambiguous_needs_patch
    drift: true
    drift_severity: P2
    conflicting_artifacts:
      - UL Baseline uses flat field name input_completeness with only two values
      - ADR-059 D3 nests as completeness.status with three values
    required_patch: >
      UL Baseline completeness envelope table: rename input_completeness → completeness.status;
      add integrity_failure as third allowed value.

  - term: missing_inputs
    canonical_definition: >
      Array of absent inputs. Only ['drop_estimate'] is a valid normal missing-inputs value.
      opening_inventory_cents and closing_inventory_cents are NEVER listed here;
      their absence is represented in integrity_issues.
    artifact_usage:
      UL_Baseline: "valid entries: ['drop_estimate'] only; opener/closer absence → integrity_issues"
      Classification_YAML: missing_inputs covers only drop_estimate
      ADR-059_D3: ReadonlyArray<'drop_estimate'>; canonical
      ADR-059_D4: inventory_only path missing_inputs = ['drop_estimate']
    status: canonical
    drift: false
    required_patch: none

  - term: included_inputs
    canonical_definition: >
      Array of successfully resolved inputs in canonical order.
      Frozen literal values per ADR-059 D4:
      telemetry_drop_formula: ['opening_inventory', 'closing_inventory', 'fills', 'credits', 'telemetry_drop_estimate']
      inventory_only: ['opening_inventory', 'closing_inventory', 'fills', 'credits']
      integrity_failure: deterministic subset of resolved inputs
    artifact_usage:
      ADR-059_D4: frozen literals; no conflicts
    status: canonical_frozen_literals
    drift: false
    required_patch: none

# ─────────────────────────────────────────────────────────────────
# SECTION 3 — SEMANTIC CRACK REGISTER
# ─────────────────────────────────────────────────────────────────
semantic_crack_register:

  - crack_id: CRACK-001
    severity: P1
    term: "Estimated Win/Loss (surface label)"
    artifacts:
      - docs/issues/table-inventory-accounting-canon/planning/TABLE_INVENTORY_ACCOUNTING_UBIQUITOUS_LANGUAGE_BASELINE.md
      - docs/issues/table-inventory-accounting-canon/planning/FIB-H-TIA-CANON-001-classification.yaml
    conflicting_wording: |
      UL Baseline §Surface rendering rules — projected win/loss state block:
        "Estimated Win/Loss: $X    ← acceptable alternative label"
      Classification YAML allowed_surface_labels:
        - Projected Win/Loss
        - Estimated Win/Loss   ← present
        - Partial Table Result
    canonical_wording: |
      ADR-060 D4 forbidden_surface_labels:
        "Estimated Win/Loss  ← removed from allowed list; ambiguous; use 'Projected Win/Loss' only"
    required_patch: |
      (1) UL Baseline §Surface rendering rules — projected win/loss state block:
          Delete: "Estimated Win/Loss: $X    ← acceptable alternative label"
          Add: "Estimated Win/Loss is forbidden — ADR-060 D4 removed it from the allowed
               list as ambiguous. Use Projected Win/Loss only."
      (2) Classification YAML allowed_surface_labels:
          Remove "Estimated Win/Loss" entry.
          Add forbidden_note: "Estimated Win/Loss removed per ADR-060 D4 — ambiguous;
          Projected Win/Loss is the sole allowed label for telemetry_drop_formula path."
    downstream_risk: >
      A PRD or EXEC-SPEC reading the UL Baseline as authoritative will permit "Estimated Win/Loss"
      on operator surfaces — a direct ADR-060 D4 violation. Acceptance test TIA-CANON-FORBIDDEN-LABELS
      will fail. Operator surfaces showing "Estimated Win/Loss" create a labeling inconsistency
      that survives into production if not patched before PRD.

  - crack_id: CRACK-002
    severity: P1
    term: source_authority.inventory (DTO key)
    artifacts:
      - docs/80-adrs/ADR-059-table-inventory-accounting-canon-ownership-and-formula.md
    conflicting_wording: |
      ADR-059 D3 TableInventoryAccountingProjection interface:
        source_authority: {
          drop:      'telemetry_derived_estimate' | 'none'
          inventory: 'table_inventory_snapshot'    ← WRONG KEY
          fills:     'table_fill'
          credits:   'table_credit'
        }
    canonical_wording: |
      ADR-060 D3 (authoritative shape — explicitly supersedes ADR-059 D3):
        source_authority: {
          drop:      'telemetry_derived_estimate' | 'none'
          snapshots: 'table_inventory_snapshot'    ← CORRECT KEY
          fills:     'table_fill'
          credits:   'table_credit'
        }
      Acceptance test: "No source_authority.inventory key may exist."
    required_patch: |
      ADR-059 D3 source_authority TypeScript interface block:
        Replace: inventory: 'table_inventory_snapshot'
        With:    snapshots: 'table_inventory_snapshot'
      Add inline comment: // KEY AMENDED: 'inventory' → 'snapshots' per ADR-060 D3.
      Add section header note: "D3 source_authority shape is amended by ADR-060 D3.
      The 'inventory' key no longer exists; the authoritative key is 'snapshots'.
      ADR-060 D3 is the governing definition."
    downstream_risk: >
      Implementor reading ADR-059 as the canonical DTO spec produces source_authority.inventory
      in every API response. TIA-CANON-SOURCE-AUTHORITY-SHAPE acceptance test fails.
      Any downstream consumer destructuring source_authority.snapshots receives undefined.
      This is a silent DTO shape error that only surfaces at integration test time.

  - crack_id: CRACK-003
    severity: P2
    term: estimated_drop_cents (status classification)
    artifacts:
      - docs/issues/table-inventory-accounting-canon/planning/FIB-H-TIA-CANON-001-classification.yaml
    conflicting_wording: |
      Classification YAML drop_term_status.estimated_drop_cents:
        status: acceptable_with_label
        reason: "System-estimated value... ADR-053 compliant if labeled estimated/partial."
    canonical_wording: |
      ADR-060 D1: "estimated_drop_cents — Deprecated alias — transitional only.
        Do not introduce in new code, migrations, or API contracts."
      ADR-060 D4: listed under forbidden field/variable names at DTO/API/surface boundary.
    required_patch: |
      Classification YAML drop_term_status.estimated_drop_cents:
        Change status: acceptable_with_label → deprecated_alias_transitional
        Add note: "Forbidden at DTO/API/surface boundary per ADR-060 D1/D4.
                   Legacy/implementation-local occurrences must be mapped to
                   telemetry_derived_drop_estimate_cents before crossing any boundary."
    downstream_risk: >
      PRD author reading Classification YAML may accept estimated_drop_cents at an API boundary,
      believing it is compliant if labeled. Silently introduces a non-canonical field name that
      ADR-060 D4 forbids. Creates a naming violation that passes visual review but fails
      the TIA-CANON-LEGACY-NAME-BOUNDARY acceptance test.

  - crack_id: CRACK-004
    severity: P2
    term: RATED_ADJUSTMENT (telemetry kind — exclusion coverage)
    artifacts:
      - docs/issues/table-inventory-accounting-canon/planning/TABLE_INVENTORY_ACCOUNTING_UBIQUITOUS_LANGUAGE_BASELINE.md
      - docs/issues/table-inventory-accounting-canon/planning/FIB-H-TIA-CANON-001-classification.yaml
      - docs/01-scaffolds/SCAFFOLD-TABLE-INVENTORY-ACCOUNTING-CANON.md
    conflicting_wording: |
      UL Baseline: silent on RATED_ADJUSTMENT; no exclusion statement in canonical drop taxonomy table.
      Classification YAML: silent; open_question_L telemetry source resolution does not name it.
      Scaffold §4 predicate comment: "Column name telemetry_kind verified against DDL" —
        no note that RATED_ADJUSTMENT is intentionally absent.
    canonical_wording: |
      ADR-060 D2: "RATED_ADJUSTMENT is explicitly excluded from the canon. This exclusion
        is semantic, not a claim that the value is absent from the current database schema.
        Current legacy/shift-metrics paths may accept or aggregate RATED_ADJUSTMENT."
      ADR-061 D2: "RATED_ADJUSTMENT is intentionally absent from this predicate.
        Its absence is a canonical exemplar decision, not an assertion that legacy/current
        schema paths cannot contain that value."
    required_patch: |
      (1) UL Baseline canonical drop taxonomy table: add row:
            term: RATED_ADJUSTMENT
            meaning: Legacy/current adjustment kind; non-canonical for telemetry_derived_drop_estimate_cents
            amount_known: N/A
            authority_posture: excluded by semantic decision; may exist in legacy paths
            current_pt2_scope: Excluded — must not contribute to canonical session-scoped SUM (ADR-060 D2)
      (2) Classification YAML open_question_L_telemetry_source.resolution: append sentence:
            "RATED_ADJUSTMENT rows are excluded by semantic decision (ADR-060 D2), not by schema
             absence. Legacy shift-metrics paths may contain RATED_ADJUSTMENT; they must not be
             copied into TableInventoryAccounting."
      (3) Scaffold §4 telemetry predicate block: add inline comment after kind IN clause:
            "-- RATED_ADJUSTMENT intentionally excluded per ADR-060 D2.
             -- Exclusion is semantic (canonical decision), not structural (schema does allow it).
             -- Do not add RATED_ADJUSTMENT here without an ADR/FIB amendment."
    downstream_risk: >
      Implementor reading only UL Baseline or Scaffold will see a predicate with no RATED_ADJUSTMENT
      exclusion rationale. If a legacy path or shift-metrics RPC includes RATED_ADJUSTMENT in its
      aggregation, it may appear "natural" to include it in the new service module.
      TIA-CANON-RATED-ADJUSTMENT-EXCLUSION acceptance test would catch this, but only if that test
      is written — which requires RATED_ADJUSTMENT to be surfaced in the PRD acceptance criteria.

  - crack_id: CRACK-005
    severity: P2
    term: input_completeness / completeness.status (field naming and enum width)
    artifacts:
      - docs/issues/table-inventory-accounting-canon/planning/TABLE_INVENTORY_ACCOUNTING_UBIQUITOUS_LANGUAGE_BASELINE.md
    conflicting_wording: |
      UL Baseline completeness envelope table:
        Field: input_completeness
        Meaning: "Whether all PT-2 expected operational inputs are present (complete / partial).
                  Only applies when opener and closer are resolvable."
        (No mention of integrity_failure as a third status value.)
    canonical_wording: |
      ADR-059 D3 completeness object:
        status: 'complete' | 'partial' | 'integrity_failure'
      (Three values; nested under completeness object, not a top-level field.)
    required_patch: |
      UL Baseline completeness envelope table:
        Rename field: input_completeness → completeness.status
        Add integrity_failure as third allowed value with note:
          "active only when integrity_issues is non-empty; suppresses both result fields;
           mutually exclusive with input_completeness=partial."
    downstream_risk: >
      Surface implementor reading the UL Baseline may build a flat input_completeness field
      with only two values, missing the DTO nesting structure and integrity_failure variant
      needed for the integrity-disclosure render path. The integrity-failure disclosure path
      silently degrades to rendering "Partial Table Result" instead of the correct suppression path.

# ─────────────────────────────────────────────────────────────────
# SECTION 4 — FORBIDDEN SYNONYM REGISTER
# ─────────────────────────────────────────────────────────────────
forbidden_synonym_register:

  field_names_forbidden_at_dto_api_surface:
    - name: estimated_drop_buyins_cents
      category: non_canonical_field_name
      why: implies drop amount; underlying data valid but name non-canonical
      notes: legacy only; delete or rename before exemplar acceptance
    - name: estimated_drop_cents
      category: deprecated_alias
      why: ambiguous; does not declare telemetry derivation or non-custody posture
      notes: transitional only; forbidden at DTO/API/surface per ADR-060 D4
    - name: running_drop_cents
      category: forbidden
      why: implies live custody amount
    - name: drop_activity_cents
      category: forbidden
      why: implies an amount from a posture-only signal
    - name: projected_drop_from_buyins_cents
      category: forbidden
      why: non-canonical name pattern
    - name: recorded_operational_drop_cents
      category: tombstoned
      why: reads too close to "posted drop"; implies custody connotation
    - name: drop_cents
      category: forbidden
      why: generic; ambiguous authority posture
    - name: win_loss_inventory_cents
      category: legacy_p0_suppression
      why: dashboard-local; non-canonical formula; split-brain source
      notes: must be suppressed when exemplar ships; not merely deprecated
    - name: win_loss_estimated_cents
      category: legacy_p0_suppression
      why: dashboard-local; non-canonical formula
      notes: must be suppressed when exemplar ships
    - name: win_loss_estimated_total_cents
      category: legacy_p0_suppression
      why: dashboard-local aggregate
      notes: must be suppressed when exemplar ships
    - name: source_authority.inventory
      category: superseded_dto_key
      why: replaced by source_authority.snapshots per ADR-060 D3
      notes: must never appear in a TableInventoryAccountingProjection response

  surface_labels_forbidden:
    - label: "Estimated Win/Loss"
      why: removed from allowed list by ADR-060 D4; ambiguous
    - label: "Win/Loss"
      qualifier: unqualified
      why: reserved for final_table_win_loss_cents only; unreachable in this slice
    - label: "Final Win/Loss"
      why: requires external custody authority
    - label: "Total Drop"
      why: implies finalized drop total; ADR-053 violation
    - label: "Posted Drop"
      why: implies posting/finalization
    - label: "Posted Drop Amount"
      why: implies posting/finalization
    - label: "Final Drop"
      why: implies finality
    - label: "Settled Result"
      why: implies settlement
    - label: "Reconciled Result"
      why: implies reconciliation finality
    - label: "Running Drop: $X"
      why: forbidden per UL Baseline surface rendering rules
    - label: "Estimated Drop: $X"
      why: forbidden per UL Baseline surface rendering rules
    - label: "Drop Total: $X"
      why: forbidden per UL Baseline surface rendering rules

# ─────────────────────────────────────────────────────────────────
# SECTION 5 — ACCEPTANCE-TEST REQUIREMENTS
# ─────────────────────────────────────────────────────────────────
acceptance_test_requirements:

  - test_id: TIA-CANON-RATED-ADJUSTMENT-EXCLUSION
    authority:
      - ADR-060 D2
      - ADR-061 D2
    setup:
      - Create a table session with valid opener/closer/fill/credit inputs
      - Insert within-session-window table_buyin_telemetry rows:
          - telemetry_kind: RATED_BUYIN
            amount_cents: 10000
          - telemetry_kind: GRIND_BUYIN
            amount_cents: 5000
          - telemetry_kind: RATED_ADJUSTMENT
            amount_cents: 999999
    expected:
      telemetry_derived_drop_estimate_cents: 15000
      drop_estimate_state: present
      calculation_kind: telemetry_drop_formula
      projected_table_win_loss_cents: uses_15000_only  # not 1014999
      RATED_ADJUSTMENT_effect: none  # zero effect on any canonical DTO field
      completeness_status: complete
      missing_inputs: []

  - test_id: TIA-CANON-NULL-VS-ZERO
    authority:
      - ADR-059 D2
      - ADR-061 D6
    cases:
      - case: A
        description: No RATED_BUYIN or GRIND_BUYIN rows within session window
        expected:
          telemetry_derived_drop_estimate_cents: null
          drop_estimate_state: none_for_session
          calculation_kind: inventory_only
          projected_table_win_loss_cents: null
          partial_table_result_cents: set  # non-null
      - case: B
        description: RATED_BUYIN and GRIND_BUYIN rows exist; all amount_cents = 0
        expected:
          telemetry_derived_drop_estimate_cents: 0
          drop_estimate_state: present
          calculation_kind: telemetry_drop_formula
          projected_table_win_loss_cents: set  # may be negative
    invariant: no COALESCE path converts null to 0 or 0 to null anywhere in TableInventoryAccounting

  - test_id: TIA-CANON-SESSION-SCOPE-ONLY
    authority:
      - ADR-061 D1
      - ADR-061 D2
      - ADR-061 D4
    setup:
      - Same table, same gaming day, two sequential table sessions (A and B)
      - Insert RATED_BUYIN telemetry within session A window
      - Insert RATED_BUYIN telemetry within session B window
    expected:
      session_A_projection: includes only rows where occurred_at in [A.opened_at, COALESCE(A.closed_at, NOW()))
      session_B_projection: includes only rows where occurred_at in [B.opened_at, COALESCE(B.closed_at, NOW()))
      gaming_day_as_predicate: forbidden  # gaming_day must not appear in SUM WHERE clause
      cross_session_contamination: test_failure

  - test_id: TIA-CANON-FORBIDDEN-LABELS
    authority:
      - ADR-060 D4
    expected:
      telemetry_drop_formula_label: "Projected Win/Loss"  # only; no other label emitted
      inventory_only_label: "Partial Table Result"  # only
      integrity_failure_label: none  # integrity disclosure only; no result label
      forbidden_labels_absent:
        - "Estimated Win/Loss"
        - "Win/Loss"
        - "Total Drop"
        - "Posted Drop"
        - "Final Win/Loss"
        - "Settled Result"
        - "Reconciled Result"
      codebase_grep:
        description: grep of all active BFF/API/component files for forbidden label strings
        expected_result: zero_matches  # excluding test fixtures

  - test_id: TIA-CANON-SOURCE-AUTHORITY-SHAPE
    authority:
      - ADR-060 D3
    expected_shape:
      source_authority:
        drop: "'telemetry_derived_estimate' | 'none'"
        snapshots: table_inventory_snapshot
        fills: table_fill
        credits: table_credit
    invariants:
      - source_authority.inventory key must be ABSENT (its presence is a test failure)
      - "drop: 'telemetry_derived_estimate'" when drop_estimate_state = present
      - "drop: 'none'" when drop_estimate_state = none_for_session
      - snapshots/fills/credits must always be set to literal source table names; never null

  - test_id: TIA-CANON-INTEGRITY-FAILURE-SUPPRESSION
    authority:
      - ADR-059 D5
    setup:
      - Session with opening_inventory_cents unresolvable (null after dual-path lookup)
    expected:
      projected_table_win_loss_cents: null
      partial_table_result_cents: null
      integrity_issues: [missing_opening_inventory_snapshot]
      calculation_kind: integrity_failure
      operator_surface_label: none  # integrity disclosure only
      forbidden_on_surface: "Partial Table Result"  # must NOT appear
      operational_diagnostic: required  # structured log or equivalent; silent disclosure is insufficient

  - test_id: TIA-CANON-LEGACY-NAME-BOUNDARY
    authority:
      - ADR-060 D4
      - Classification YAML legacy_stream_disposition
    expected:
      - estimated_drop_buyins_cents: absent from all TableInventoryAccountingProjection responses
      - win_loss_inventory_cents: absent from all active operator-visible responses after exemplar acceptance
      - win_loss_estimated_cents: absent from all active operator-visible responses after exemplar acceptance
      - win_loss_estimated_total_cents: absent from all active operator-visible responses after exemplar acceptance
      - source_authority.inventory: absent from all API responses
    verification:
      grep_active_bff_handlers_for_legacy_fields: zero_results  # excluding archived/suppressed surfaces

# ─────────────────────────────────────────────────────────────────
# SECTION 6 — FINAL RECOMMENDATION
# ─────────────────────────────────────────────────────────────────
final_recommendation:
  may_proceed_to_prd: conditionally_yes
  condition: two P1 patches must be committed before PRD authorization

  patches_required_before_prd:

    - patch_id: PATCH-1
      crack_ref: CRACK-001
      severity: P1
      blocking: true
      description: Remove "Estimated Win/Loss" from UL Baseline and Classification YAML
      changes:
        - file: docs/issues/table-inventory-accounting-canon/planning/TABLE_INVENTORY_ACCOUNTING_UBIQUITOUS_LANGUAGE_BASELINE.md
          section: "§Surface rendering rules — projected win/loss state block"
          action: >
            Delete: "Estimated Win/Loss: $X    ← acceptable alternative label"
            Add: "Estimated Win/Loss is forbidden — ADR-060 D4 removed it from the allowed
                 list as ambiguous. Use Projected Win/Loss only."
        - file: docs/issues/table-inventory-accounting-canon/planning/FIB-H-TIA-CANON-001-classification.yaml
          section: allowed_surface_labels
          action: >
            Remove "Estimated Win/Loss" entry.
            Add forbidden_note: "Estimated Win/Loss removed per ADR-060 D4 — ambiguous;
            Projected Win/Loss is the sole allowed label for the telemetry_drop_formula path."

    - patch_id: PATCH-2
      crack_ref: CRACK-002
      severity: P1
      blocking: true
      description: Inline-amend ADR-059 D3 source_authority block to use 'snapshots' key
      changes:
        - file: docs/80-adrs/ADR-059-table-inventory-accounting-canon-ownership-and-formula.md
          section: D3 — TableInventoryAccountingProjection interface, source_authority block
          action: >
            Replace: inventory: 'table_inventory_snapshot'
            With:    snapshots: 'table_inventory_snapshot'
            Add inline comment: // KEY AMENDED: 'inventory' → 'snapshots' per ADR-060 D3.
            Add section header note: "D3 source_authority shape is amended by ADR-060 D3.
            The 'inventory' key no longer exists; the authoritative key is 'snapshots'.
            ADR-060 D3 is the governing definition."

  patches_recommended_before_prd:

    - patch_id: PATCH-3
      crack_ref: CRACK-003
      severity: P2
      blocking: false
      description: >
        Update Classification YAML estimated_drop_cents status from acceptable_with_label
        to deprecated_alias_transitional.
      changes:
        - file: docs/issues/table-inventory-accounting-canon/planning/FIB-H-TIA-CANON-001-classification.yaml
          section: drop_term_status.estimated_drop_cents
          action: >
            status: acceptable_with_label → deprecated_alias_transitional
            Add note: "Forbidden at DTO/API/surface boundary per ADR-060 D1/D4."

    - patch_id: PATCH-4
      crack_ref: CRACK-004
      severity: P2
      blocking: false
      description: Add explicit RATED_ADJUSTMENT exclusion statements to baseline artifacts
      changes:
        - file: docs/issues/table-inventory-accounting-canon/planning/TABLE_INVENTORY_ACCOUNTING_UBIQUITOUS_LANGUAGE_BASELINE.md
          section: Canonical drop taxonomy table
          action: >
            Add RATED_ADJUSTMENT row: status non-canonical/excluded; note consistent with ADR-060 D2.
        - file: docs/issues/table-inventory-accounting-canon/planning/FIB-H-TIA-CANON-001-classification.yaml
          section: open_question_L_telemetry_source.resolution
          action: >
            Append: "RATED_ADJUSTMENT rows are excluded by semantic decision (ADR-060 D2),
            not by schema absence. Do not add without ADR/FIB amendment."
        - file: docs/01-scaffolds/SCAFFOLD-TABLE-INVENTORY-ACCOUNTING-CANON.md
          section: §4 Telemetry Aggregation Predicate
          action: >
            Add inline comment after telemetry_kind IN clause:
            "-- RATED_ADJUSTMENT intentionally excluded per ADR-060 D2.
             -- Semantic exclusion, not structural. Do not add without ADR/FIB amendment."

    - patch_id: PATCH-5
      crack_ref: CRACK-005
      severity: P2
      blocking: false
      description: >
        UL Baseline completeness envelope: rename input_completeness → completeness.status;
        add integrity_failure as third value.
      changes:
        - file: docs/issues/table-inventory-accounting-canon/planning/TABLE_INVENTORY_ACCOUNTING_UBIQUITOUS_LANGUAGE_BASELINE.md
          section: Completeness envelope table
          action: >
            Rename field: input_completeness → completeness.status
            Add integrity_failure as third allowed value:
              "active only when integrity_issues non-empty; suppresses both result fields;
               mutually exclusive with completeness.status=partial."

  open_gate_must_be_absorbed_by_prd:
    gate: dashboard_suppression_gate
    source: Classification YAML prd_gate_patches
    severity: P0
    requirement: >
      The exemplar PRD must include a verified suppression inventory of every
      active operator-visible win/loss-like surface, with a classified disposition
      for each: consume_projection | suppress | outside_exemplar_boundary.
      Any outside-boundary classification requires evidence that the surface is not
      an active operator workflow for the exemplar release.
      Competing visible semantics after exemplar acceptance are a P0 split-brain violation
      regardless of consumer migration timeline.
    suppression_targets_p0:
      - components/pit/hero-win-loss-compact.tsx
      - components/pit/pit-metrics-table.tsx
      - components/pit/table-metrics-table.tsx
      - components/dashboard/analytics-panel.tsx
      - components/dashboard/casino-summary-card.tsx
      - "services/table-context/rundown.ts (local win formula)"
      - "win_loss_inventory_cents, win_loss_estimated_cents, estimated_drop_buyins_cents DTO fields"

  summary:
    adr_059_ownership_and_formula: clean
    adr_060_drop_taxonomy: clean  # source_authority key patch required in ADR-059; ADR-060 itself is correct
    adr_061_session_scope_boundary: clean
    ul_baseline_classification_yaml_alignment: two_patches_required
    rated_adjustment_exclusion_adr_level: clean
    rated_adjustment_exclusion_baseline_level: p2_gap_patch_recommended
    downstream_prd_exec: none_authored_gate_open
    verdict: patch_required_before_PRD  # ADR set may be accepted; PRD gate opens after PATCH-1 and PATCH-2
