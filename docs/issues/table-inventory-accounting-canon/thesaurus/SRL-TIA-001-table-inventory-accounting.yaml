srl_extension:
  id: SRL-TIA-001
  title: TableInventoryAccounting Semantic Extension
  srlversion: "1.0.0"
  status: canonical
  effective: "2026-05-29"
  admitted_to: docs/20-architecture/SEMANTIC_RESPONSIBILITY_LAYER.md
  feature: FIB-H-TIA-CANON-001
  srm_owner:
    context: TableContextService
    subdomain: TableInventoryAccounting
  adr_spine: [ADR-059, ADR-060, ADR-061]
  zachman_proof: docs/issues/table-inventory-accounting-canon/thesaurus/TIA-CANON-THESAURUS-ZACHMAN.yaml
  accepted_language_index: docs/issues/table-inventory-accounting-canon/thesaurus/TIA-CANON-EXEMPLAR-THESAURUS.md

semantic_posture:
  role: read-time derived semantic authority for table-result values
  write_authority: none
  semantic_rule: >
    TableInventoryAccounting may derive table-result language from canonical
    TableContext-owned inputs and approved telemetry-derived estimate inputs.
    It may not author financial facts, claim custody authority, or permit
    downstream surfaces to re-derive competing win/loss-like values.

srm_ownership_gaps:
  - table: table_buyin_telemetry
    posture: consumed_by_TableInventoryAccounting_for_telemetry_derived_drop_estimate
    ownership_gap: formal_owns_table_entry_required_in_service_responsibility_overview
    blocks_srl_admission: false
    blocks_tia_prd_execution: yes_unless_explicitly_resolved
    must_resolve_by: TIA_PRD_preflight_or_PRD_itself

admitted_terms:

  - term: projected_table_win_loss_cents
    owning_context: TableContextService
    owning_subdomain: TableInventoryAccounting
    semantic_class: derived_surface_value
    status: canonical
    adr_basis: [ADR-059-D2, ADR-061-D2]

    what_the_system_knows: >
      PT-2 has computed a table-result value from all five canonical formula inputs: a
      session-scoped telemetry-derived drop estimate plus inventory-side inputs (opener,
      closer, fills, credits). This is the system's best non-custody estimate of table
      win/loss when drop telemetry is present for the session.

    how_the_system_knows: >
      Read-time derivation by TableInventoryAccounting using the 5-operand formula:
      telemetry_derived_drop_estimate_cents + closing_inventory_cents + credits_cents
      − opening_inventory_cents − fills_cents. Applied only when calculation_kind =
      'telemetry_drop_formula' (all five inputs non-null). Source predicate is frozen
      per TIA-CANON-EXEMPLAR-THESAURUS.md §3.8.

    authority_posture: non_custody_estimate
    allowed_surface_label: "Projected Win/Loss"
    allowed_surface_qualifier: "Includes telemetry-derived drop estimate. Non-custody. Not final."

    source_inputs:
      - telemetry_derived_drop_estimate_cents
      - opening_inventory_cents
      - closing_inventory_cents
      - fills_cents
      - credits_cents

    may_be_authored_by:
      - none  # derived value; no authoring store

    may_be_derived_by:
      - TableContextService.TableInventoryAccounting

    may_be_rendered_by:
      - consumers of TableInventoryAccountingProjection only

    must_not_be_rederived_by:
      - dashboard components
      - route-local formula paths
      - shift metric RPCs
      - UI components reading raw inventory or telemetry fields

    boundary_contract:
      dto: TableInventoryAccountingProjection
      api: table inventory accounting projection endpoint
      ui: only through projection-consuming surfaces

    enforcement:
      - DTO contract test
      - formula test (5-operand)
      - TIA-CANON-RATED-ADJUSTMENT-EXCLUSION
      - TIA-CANON-SESSION-SCOPE-ONLY
      - active-surface suppression gate

    zachman:
      what: The canonical 5-operand table win/loss estimate when drop telemetry is present.
      how: Read-time derivation via 5-operand formula; session-scoped telemetry SUM as drop input.
      where: TableInventoryAccounting service module; exposed through TableInventoryAccountingProjection DTO.
      who: Owned by TableContextService.TableInventoryAccounting; consumed by pit terminal, shift dashboard, rundown report, shift report.
      when: Non-null only when calculation_kind = 'telemetry_drop_formula'; null for inventory_only or integrity_failure.
      why: Eliminates independent per-surface derivations that produced competing win/loss values; establishes one formula and one non-custody estimate authority.

  - term: partial_table_result_cents
    owning_context: TableContextService
    owning_subdomain: TableInventoryAccounting
    semantic_class: derived_surface_value
    status: canonical
    adr_basis: [ADR-059-D5]

    what_the_system_knows: >
      PT-2 has computed a table-result value from opener, closer, fills, and credits only.
      No drop estimate is available for this session. The result is explicitly partial: it
      accounts for inventory changes but not for drop.

    how_the_system_knows: >
      Read-time derivation using 4 operands: closing_inventory_cents + credits_cents
      − opening_inventory_cents − fills_cents. Applied only when calculation_kind =
      'inventory_only' (drop absent, opener and closer both resolvable).

    authority_posture: non_custody_estimate
    allowed_surface_label: "Partial Table Result"
    allowed_surface_qualifier: "Disclose missing inputs (e.g., 'Drop estimate not available for this session')."

    source_inputs:
      - opening_inventory_cents
      - closing_inventory_cents
      - fills_cents
      - credits_cents

    may_be_authored_by:
      - none

    may_be_derived_by:
      - TableContextService.TableInventoryAccounting

    may_be_rendered_by:
      - consumers of TableInventoryAccountingProjection only

    must_not_be_rederived_by:
      - dashboard components
      - route-local formula paths
      - shift metric RPCs
      - UI components reading raw inventory fields

    boundary_contract:
      dto: TableInventoryAccountingProjection
      api: table inventory accounting projection endpoint
      ui: only through projection-consuming surfaces; must disclose missing drop estimate

    enforcement:
      - DTO contract test
      - TIA-CANON-NULL-VS-ZERO
      - TIA-CANON-SURFACE-LABEL-CONFORMANCE
      - active-surface suppression gate

    zachman:
      what: The canonical 4-operand table result when drop telemetry is absent for the session.
      how: Read-time derivation via 4 operands (opener + closer + fills + credits; no drop).
      where: TableInventoryAccounting service module; exposed through TableInventoryAccountingProjection DTO.
      who: Owned by TableContextService.TableInventoryAccounting; consumed by surfaces that handle inventory_only calculation_kind.
      when: Non-null only when calculation_kind = 'inventory_only'; null for telemetry_drop_formula or integrity_failure.
      why: Provides a canonical non-null result for sessions where drop telemetry is absent; makes incompleteness explicit to the operator rather than silently collapsing to zero.

  - term: final_table_win_loss_cents
    owning_context: TableContextService
    owning_subdomain: TableInventoryAccounting
    semantic_class: reserved_future_term
    status: reserved_null_this_slice
    adr_basis: [ADR-059-D3]

    what_the_system_knows: >
      A custody-authoritative table win/loss value that would incorporate physical soft-count
      posted drop data. PT-2 cannot claim this value in this slice. Always null.

    how_the_system_knows: >
      Not derivable by PT-2 in this slice. Requires external custody authority (physical
      soft-count drop) introduced by a separate ADR/FIB amendment. No input path exists.

    authority_posture: custody_authoritative  # reserved; not claimed or claimable in this slice
    allowed_surface_label: null  # no surface label permitted; must never be approximated by any other field

    source_inputs:
      - not_available_in_this_slice

    may_be_authored_by:
      - none_in_this_slice

    may_be_derived_by:
      - none_in_this_slice

    may_be_rendered_by:
      - none_in_this_slice

    must_not_be_rederived_by:
      - any component in this slice
      - must not be approximated by projected_table_win_loss_cents or partial_table_result_cents

    boundary_contract:
      dto: TableInventoryAccountingProjection
      api: always null in DTO response
      ui: must not render a label or value for this field

    enforcement:
      - reserved_null guard (field always null in all DTO responses)
      - no surface may render a label for this field

    zachman:
      what: A reserved field holding space for a future custody-authoritative table win/loss total.
      how: Not derivable in this slice; requires external soft-count custody authority.
      where: Present as a null field in TableInventoryAccountingProjection DTO.
      who: Reserved by TableContextService.TableInventoryAccounting; no current consumer may use it.
      when: Always null in this slice; reserved vocabulary with no implementation permission.
      why: Reserves vocabulary for a future custody-authoritative path while preventing "Win/Loss" unqualified labels from implying false custody authority in the current system.

  - term: drop_estimate_state
    owning_context: TableContextService
    owning_subdomain: TableInventoryAccounting
    semantic_class: lifecycle_state
    status: canonical
    adr_basis: [ADR-061-D6]

    what_the_system_knows: >
      Whether a telemetry-derived drop estimate is present or absent for this session.
      'present' means telemetry_derived_drop_estimate_cents is non-null (including zero).
      'none_for_session' means the session-scoped SUM returned null — no qualifying rows
      exist in the window. These are distinct states.

    how_the_system_knows: >
      Set at derivation time by inspecting the nullability of telemetry_derived_drop_estimate_cents
      after executing the session-scoped SUM. 'present' iff non-null; 'none_for_session' iff null.
      Never COALESCE'd.

    authority_posture: non_custody_estimate
    allowed_surface_label: null  # internal discriminator; not directly surface-rendered

    source_inputs:
      - telemetry_derived_drop_estimate_cents (nullability only)

    may_be_authored_by:
      - none

    may_be_derived_by:
      - TableContextService.TableInventoryAccounting

    may_be_rendered_by:
      - consumers of TableInventoryAccountingProjection (for conditional rendering logic)

    must_not_be_rederived_by:
      - any consumer; must be consumed from the DTO, not recomputed

    boundary_contract:
      dto: TableInventoryAccountingProjection
      api: present in all DTO responses; exactly one value per response
      ui: used by consumers for conditional rendering; not directly rendered as a label

    enforcement:
      - TIA-CANON-NULL-VS-ZERO
      - DTO contract test

    zachman:
      what: A two-valued discriminator encoding whether session telemetry drop is present or absent.
      how: Derived from nullability of the session-scoped SUM result; never COALESCE'd.
      where: TableInventoryAccountingProjection DTO field.
      who: Owned by TableContextService.TableInventoryAccounting; used by rendering consumers for conditional logic.
      when: Always present in the DTO; exactly one value per response; 'present' when SUM is non-null including zero.
      why: Preserves the null-vs-zero semantic boundary; prevents conflation of "no qualifying rows for session" with "qualifying rows sum to zero".

  - term: calculation_kind
    owning_context: TableContextService
    owning_subdomain: TableInventoryAccounting
    semantic_class: lifecycle_state
    status: canonical
    adr_basis: [ADR-059-D5]

    what_the_system_knows: >
      Which of the three canonical result states applies for this projection:
      'telemetry_drop_formula' (all 5 inputs present), 'inventory_only' (drop absent,
      opener+closer resolvable), or 'integrity_failure' (opener or closer unresolvable).

    how_the_system_knows: >
      Set by the three-result-state machine in TableInventoryAccounting based on input
      availability after resolving all inputs. States are exhaustive and mutually exclusive.
      A fourth state must not be invented without an ADR/FIB amendment.

    authority_posture: non_custody_estimate
    allowed_surface_label: null  # internal discriminator; governs which result field and label applies

    source_inputs:
      - telemetry_derived_drop_estimate_cents (nullability)
      - opening_inventory_cents (resolvability)
      - closing_inventory_cents (resolvability)

    may_be_authored_by:
      - none

    may_be_derived_by:
      - TableContextService.TableInventoryAccounting

    may_be_rendered_by:
      - consumers of TableInventoryAccountingProjection (for result-field routing)

    must_not_be_rederived_by:
      - any consumer; must be consumed from the DTO, not recomputed

    boundary_contract:
      dto: TableInventoryAccountingProjection
      api: present in all DTO responses; exactly one value per response
      ui: governs which result field is rendered and which surface label applies

    enforcement:
      - DTO contract test
      - TIA-CANON-INTEGRITY-FAILURE-SUPPRESSION
      - TIA-CANON-SURFACE-LABEL-CONFORMANCE

    zachman:
      what: A three-valued discriminator identifying which canonical result state applies.
      how: Set by the three-result-state machine based on input availability; three states are exhaustive and mutually exclusive.
      where: TableInventoryAccountingProjection DTO field.
      who: Owned by TableContextService.TableInventoryAccounting; consumed by all projection-rendering surfaces.
      when: Always present in the DTO; exactly one state per response; 'inventory_only' and 'integrity_failure' are mutually exclusive.
      why: Makes the result discriminator explicit in the DTO rather than relying on field nullability alone; enforces that integrity_failure is a distinct state, not a partial completeness variant.

  - term: telemetry_derived_drop_estimate_cents
    owning_context: TableContextService
    owning_subdomain: TableInventoryAccounting
    semantic_class: telemetry_fact
    status: canonical
    adr_basis: [ADR-060-D1, ADR-061-D2]

    what_the_system_knows: >
      The session-scoped aggregate of player buy-in telemetry (RATED_BUYIN and GRIND_BUYIN
      rows only) for this table session. Null when no qualifying rows exist in the session
      window; zero when qualifying rows exist and sum to zero. These are distinct conditions.
      This is a non-custody telemetry estimate, not an authoritative financial count.

    how_the_system_knows: >
      SQL aggregate via the frozen predicate:
        SUM(tbt.amount_cents)
        FROM table_buyin_telemetry tbt
        WHERE tbt.casino_id = ts.casino_id
          AND tbt.table_id = ts.gaming_table_id
          AND tbt.telemetry_kind IN ('RATED_BUYIN', 'GRIND_BUYIN')
          AND tbt.occurred_at >= ts.opened_at
          AND tbt.occurred_at < COALESCE(ts.closed_at, NOW())
      RATED_ADJUSTMENT rows explicitly excluded per ADR-060 D2. Result is null-preserving;
      never COALESCE'd to 0. Index: idx_tbt_kind on (casino_id, table_id, telemetry_kind, occurred_at).

    authority_posture: non_custody_estimate  # telemetry fact; not an authoritative financial count or soft-count drop total
    allowed_surface_label: null  # formula input; not directly surface-rendered

    source_inputs:
      - table_buyin_telemetry (RATED_BUYIN + GRIND_BUYIN rows only within session window)

    may_be_authored_by:
      - none  # aggregated from table_buyin_telemetry; not authored by TableInventoryAccounting

    may_be_derived_by:
      - TableContextService.TableInventoryAccounting

    may_be_rendered_by:
      - none directly; consumed as a formula input to projected_table_win_loss_cents

    must_not_be_rederived_by:
      - dashboard components
      - shift metric RPCs (rpc_shift_table_metrics uses gaming-day scope — forbidden)
      - route-local formula paths
      - UI components

    boundary_contract:
      dto: TableInventoryAccountingProjection
      api: present when drop_estimate_state = 'present'; null when 'none_for_session'
      ui: not directly rendered; informs projected_table_win_loss_cents and drop_estimate_state

    enforcement:
      - TIA-CANON-RATED-ADJUSTMENT-EXCLUSION
      - TIA-CANON-NULL-VS-ZERO
      - TIA-CANON-SESSION-SCOPE-ONLY
      - DTO contract test

    zachman:
      what: The session-scoped aggregate of RATED_BUYIN + GRIND_BUYIN telemetry; the sole drop proxy input to the canonical formula.
      how: Null-preserving SUM with frozen predicate; RATED_ADJUSTMENT excluded; session window only.
      where: Derived within TableInventoryAccounting; exposed as a DTO field in TableInventoryAccountingProjection.
      who: Owned by TableContextService.TableInventoryAccounting; consumed internally as a formula operand.
      when: Non-null (including zero) when qualifying rows exist in the session window; null when no qualifying rows.
      why: Provides the only telemetry-based drop proxy; its null-vs-zero integrity is load-bearing for drop_estimate_state discrimination; RATED_ADJUSTMENT exclusion keeps the estimate clean and auditable.

