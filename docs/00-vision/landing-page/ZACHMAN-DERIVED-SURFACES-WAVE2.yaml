open_questions:

  - id: OQ-1
    topic: "Loyalty & Rewards positioning"
    status: AMENDED
    resolved_date: "2026-05-14"
    amended_date:  "2026-05-14"
    blocks: [DS1, DS4]
    question: >
      Loyalty & Rewards is the largest operational domain (19 floor-facing + 10
      admin-config working features) and the system's primary CRM differentiator.
      Where does it fit in the causal chain?
    original_decision: >
      Option A + C combined:
        A. Fifth operational domain added to Wave 1 S2 (informational card, no Wave 1
           route, anchors narrative claim).
        C. DS5 /loyalty-rewards added as a standalone derived surface in Wave 2.
    amendment: >
      FDCM consolidation (FUNCTIONAL-DOMAINS-CONS-MAP.md, 2026-05-14) supersedes the
      original resolution. Loyalty & Rewards is absorbed into the "Understand the Player"
      executive domain (Player Intelligence). The standalone 5th S2 card is replaced by
      a 2nd domain card: "Understand the Player." DS5 is rescoped from /loyalty-rewards
      to /player-intelligence with broader scope (Player 360 + visit history + loyalty
      & value). The loyalty configurable-economics claim is preserved inside DS5 — it
      is not demoted.
    rationale: >
      The FDCM finding: player profiles, visit continuity, and loyalty are naturally
      perceived by operators as parts of the same operational loop (player identity →
      play record → earned value). Separating loyalty from the player record creates
      artificial fragmentation. "Understand the Player" is a stronger executive claim
      because it encompasses the full player value picture, not just loyalty mechanics.
    unblocks: [DS1, DS4]
    wave1_change: >
      ZACHMAN-LANDING-WIREFRAME-v3.yaml S2 changed from 5 cards to 4 executive
      domain cards. "Understand the Player" replaces the former "Loyalty & Rewards"
      card. wave_1_href is still null — informational card only in Wave 1.
    wave2_surface: DS5  # now /player-intelligence, not /loyalty-rewards

  - id: OQ-2
    topic: "Gaming-day temporal model"
    blocks: [DS1]
    question: >
      The gaming-day boundary is a genuine system differentiator — most systems
      treat days as midnight-to-midnight; this system does not. It currently
      appears once in Wave 1 S4 (Shift Continuity) as a compressed mention.
      Should it be surfaced as an explicit capability claim in DS1 (/floor-operations)?
      Candidate: a dedicated section — "The gaming day as an operational boundary" —
      explaining configurable start time, metric resets, and compliance threshold resets.
      Resolves before DS1 build.

  - id: OQ-3
    topic: "Sub-page navigation migration"
    blocks: [DS1, DS2, DS3, DS4]
    question: >
      Current sub-pages use an all-to-all CTA chain (mesh navigation).
      Proposed derived surfaces use causal-chain directional cross-links.
      When does the navigation model change?
        A. When each derived surface ships (replaces its transitional sub-page)
        B. As a separate Wave 1.5 pass to align current sub-pages before Wave 2 builds
      Option A is simpler — no separate pass, navigation migrates as each surface ships.
      Option B is cleaner — consistent navigation model before derived surfaces exist.
      Resolves before DS1 build.
