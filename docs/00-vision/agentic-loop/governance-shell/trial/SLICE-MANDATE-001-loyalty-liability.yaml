map_authority:
  register_version: "REGISTER.yaml @ ref/loyalty-canon (Proposed, map_version r2, 2026-06-22)"  # set exact commit at T1 freeze
  map_version: "MAP.md @ ref/loyalty-canon (Proposed, 2026-06-21; register r2 patch 2026-06-22)"
  source_node_ids:
    - loyalty_liability_snapshot       # projection — disposition: migrate, S4
    - loyalty_liability_shift_report   # consumer   — disposition: migrate, S4
    - loyalty_liability_widget         # consumer   — disposition: migrate, S4
  source_edge_ids:
