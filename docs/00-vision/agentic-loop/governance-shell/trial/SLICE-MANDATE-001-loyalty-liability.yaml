    - "Do NOT add surfaces that recompute point value client-side."
    - "Do NOT introduce a third balance representation."
  deferred_nodes:                                  # registered, NOT absorbed (G2)
    - { id: loyalty_balance_cache,            target_slice: loyalty_phase_2 }
    - { id: loyalty_balance_reconciliation_mv,target_slice: loyalty_phase_2 }
    - { id: loyalty_reversal_rpc,             target_slice: loyalty_phase_2 }   # the L-05 node
    - { id: seam_rs_close_accrual,            target_slice: rating_slip_seam_cert }  # the other L-05 node
    - { id: producer_accrual,                 target_slice: loyalty_phase_4 }
    - { id: producer_promo,                   target_slice: loyalty_phase_4 }
    - { id: player360_header,                 target_slice: loyalty_phase_5 }
    - { id: loyalty_panel,                    target_slice: loyalty_phase_5 }
    - { id: comp_confirm_panel,               target_slice: loyalty_phase_5 }
  stop_conditions:
    - "Any required change to a deferred node -> register it, then rescope (§13.3)."
    - "Canon conflict in the temporal_snapshot_rule mechanism -> stop before build (§13.2)."

