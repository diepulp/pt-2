# ---- §5.3 PROOF OBLIGATIONS (from register; named before design, G6) --------
proof_obligations:
  mechanism:
    required: true
    evidence_expected:
      - "as_of_policy_lookup is deterministic for (casino, snapshot_date, policy_version)"
      - "unit tests: same inputs -> same valuation regardless of later rate edits"
  producer_capability:
    required: true
    evidence_expected:
      - "snapshot RPC idempotent on (casino_id, snapshot_date, policy_version)"
  workflow_certification:
    required: true
    evidence_expected:
      - "real shift-report path supplies the cutoff date + policy version (no live fetch)"
  consumer_certification:
    required: true
    evidence_expected:
      - "shift-report + widget render snapshot rate-version + as-of; no client recompute"
  suppression:
    required: true
    evidence_expected:
      - "remove is_active-only valuation reads from all in-scope consumers"
      - "negative test: rate edit after snapshot does NOT change the reported figure"

completion_rule:
  propagation_certification_required: true
  map_update_required: true

