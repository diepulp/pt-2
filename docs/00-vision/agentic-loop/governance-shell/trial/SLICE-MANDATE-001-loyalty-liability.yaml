    - "loyalty_liability_snapshot -> loyalty_liability_shift_report"  # dated_projection_render (failing)

target:
  slice_name: loyalty_liability_as_of_valuation
  bounded_problem: >
    Loyalty liability is valued as live_balance × is_active_rate and re-prices
    whenever the rate is edited, so a previously reported liability figure (shift-
    report PDF + widget) silently changes after the fact. (L-01, L-02.)
  desired_end_state: >
    Liability is read from an as-of, policy-versioned snapshot. The snapshot table
    already carries valuation_policy_version + valuation_effective_date. Consumers
    render the snapshot's rate-version + as-of date with no live re-fetch / recompute.
  current_observed_state: >
    loyalty_liability_snapshot: legacy_projection (live_balance × is_active_rate).
    shift_report + widget: render the live snapshot with no as-of binding.
    Both edges certification_status = failing.

canon:
  governing_pattern: temporal_snapshot_rule        # register: candidate_standard, owner loyalty
  authority_artifacts:
    - "SPLIT-BRAIN-DIAGNOSIS-loyalty.md (L-01, L-02)"
    - "REGISTER proof_obligations.loyalty_liability_slice (Cure B)"
    - "Temporal Authority Stack (TEMP-002 / PRD-027) — gaming-day / as-of canon"
  exemplar_reference: >
    As-of versioned snapshot pattern (TIA projection is the nearest proven sibling:
    frozen-formula, dated projection input — tia_projection = standardized_pattern).
  maturity_target: proven_exemplar                 # candidate_standard -> proven_exemplar (G5)

containment:
