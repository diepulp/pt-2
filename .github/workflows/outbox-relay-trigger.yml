name: Outbox Relay Trigger

# Replacement for the Vercel-cron every-minute schedule (requires Pro plan).
# Runs every 5 minutes from the default branch, POSTs to the relay endpoint
# with the shared CRON_SECRET bearer token.
#
# Required GitHub secrets:
#   APP_BASE_URL  — production base URL, e.g. https://your-app.vercel.app
#   CRON_SECRET   — same value set in the Vercel environment variable

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  relay:
    name: Trigger outbox relay cycle
    runs-on: ubuntu-latest
    # Only run against the production deployment — not on forks.
    if: github.repository_owner == github.actor || github.event_name == 'workflow_dispatch'

    steps:
      - name: POST /api/internal/outbox-relay
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          missing=()

          if [ -z "${APP_BASE_URL}" ]; then
            missing+=("APP_BASE_URL")
          fi

          if [ -z "${CRON_SECRET}" ]; then
            missing+=("CRON_SECRET")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required GitHub Actions secret(s): ${missing[*]}"
            echo "Configure them in Settings -> Secrets and variables -> Actions."
            exit 2
          fi

          case "${APP_BASE_URL}" in
            http://*|https://*) ;;
            *)
              echo "::error::APP_BASE_URL must include the URL scheme, for example https://pt-2-weld.vercel.app."
              exit 2
              ;;
          esac

          APP_BASE_URL="${APP_BASE_URL%/}"

          status=$(curl -sS -o /tmp/relay-response.json -w "%{http_code}" \
            --max-time 35 \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            "${APP_BASE_URL}/api/internal/outbox-relay")

          echo "HTTP status: ${status}"
          cat /tmp/relay-response.json

          if [ "${status}" -lt 200 ] || [ "${status}" -ge 300 ]; then
            echo "Relay cycle returned non-2xx status ${status}"
            exit 1
          fi
