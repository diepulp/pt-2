name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Merge-safety gates: compile, lint, build, and unit tests.
# Integration tests require Supabase and run locally (gated by RUN_INTEGRATION_TESTS).

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
  
jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install
        run: npm install
      - name: Env drift guard
        run: |
          # Fail if the old (wrong) env var name reappears in runtime code or templates.
          # Docs/issues are excluded — they reference the old name for historical context.
          if grep -r --include='*.ts' --include='*.tsx' --include='*.js' --include='*.env*' \
            'PUBLISHABLE_OR_ANON_KEY' . \
            --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=docs; then
            echo "::error::Found PUBLISHABLE_OR_ANON_KEY in runtime code or templates. Use ANON_KEY."
            exit 1
          fi
      - name: Lint
        run: npm run lint
      - name: Type Check
        run: npm run type-check
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder

  # Move 7 (ADR-044): Unit tests under correct node runtime.
  # Advisory — continue-on-error while stabilizing.
  # Node suite: 2,627 tests, 0 failures (bounded-context rollout complete).
  # See: docs/issues/gaps/testing-arch-remediation/TESTING-GOVERNANCE-REMEDIATION.md
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install
        run: npm install
      - name: Unit Tests (node runtime)
        run: npx jest --ci --config jest.node.config.js --maxWorkers=2
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder

  # E2E tests against local Supabase + Next.js dev server.
  # Advisory — continue-on-error while stabilizing the harness.
  # Requires Docker for `supabase start`.
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Start Supabase local
        run: npx supabase start -x storage,imgproxy,inbucket,pgadmin-schema-diff,migra,postgres-meta,studio,edge-runtime,logflare,vector,supavisor
      - name: Capture Supabase env
        id: supabase-env
        run: |
          eval "$(npx supabase status -o env)"
          echo "SUPABASE_URL=$API_URL" >> "$GITHUB_OUTPUT"
          echo "SUPABASE_ANON_KEY=$ANON_KEY" >> "$GITHUB_OUTPUT"
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY" >> "$GITHUB_OUTPUT"
      - name: Run E2E tests
        run: npx playwright test e2e/workflows/player-exclusion.spec.ts e2e/api/player-exclusion-enforcement.spec.ts --reporter=list
        env:
          CI: true
          NEXT_PUBLIC_SUPABASE_URL: ${{ steps.supabase-env.outputs.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ steps.supabase-env.outputs.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase-env.outputs.SUPABASE_SERVICE_ROLE_KEY }}
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
