name: Security Gates

# SEC-007 regression gates: runs 7 security assertion scripts against an
# ephemeral Supabase local instance after every migration change.
# See: docs/issues/gaps/sec-007/GAP-SEC007-WS12-CI-GATE-WORKFLOW-MISSING.md

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'supabase/tests/security/**'
  workflow_dispatch:

concurrency:
  group: security-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-gates:
    name: SEC-007 Security Assertion Gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Supabase CLI ──────────────────────────────────────────────
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # ── Ephemeral DB ──────────────────────────────────────────────
      - name: Start Supabase (ephemeral local instance)
        run: |
          supabase start 2>&1 | tail -5
          echo "--- Supabase local stack is up ---"

      # Resolve the actual DB container name so the bash gate scripts
      # (05, 06) that use docker exec find the right container.
      - name: Resolve DB container name
        id: db-container
        run: |
          CONTAINER=$(docker ps --filter "label=com.supabase.cli.project=pt-2" \
                                --filter "label=com.docker.compose.service=db" \
                                --format '{{.Names}}' | head -1)
          if [[ -z "$CONTAINER" ]]; then
            # Fallback: find any supabase DB container
            CONTAINER=$(docker ps --filter "ancestor=supabase/postgres" \
                                  --format '{{.Names}}' | head -1)
          fi
          if [[ -z "$CONTAINER" ]]; then
            echo "ERROR: Could not find Supabase DB container"
            docker ps --format 'table {{.Names}}\t{{.Image}}' | head -10
            exit 1
          fi
          echo "container=${CONTAINER}" >> "$GITHUB_OUTPUT"
          echo "DB container: ${CONTAINER}"

      # ── Verify DB is ready ────────────────────────────────────────
      - name: Wait for DB readiness
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: |
          for i in $(seq 1 10); do
            if psql "${DB_URL}" -c "SELECT 1" > /dev/null 2>&1; then
              echo "DB is ready (attempt ${i})"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: DB not ready after 20 seconds"
          exit 1

      # ── Security Gate Tests ───────────────────────────────────────
      - name: Run security gate assertions
        env:
          DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
          SUPABASE_DB_CONTAINER: ${{ steps.db-container.outputs.container }}
        run: |
          bash supabase/tests/security/run_all_gates.sh \
            --db-url "${DB_URL}" \
            --container "${SUPABASE_DB_CONTAINER}"

      # ── Cleanup (always) ──────────────────────────────────────────
      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup 2>&1 | tail -3
