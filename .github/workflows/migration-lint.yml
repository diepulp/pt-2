name: Migration Lint

on:
  pull_request:
    paths:
      - 'supabase/migrations/**/*.sql'

jobs:
  rpc-self-injection-check:
    name: RPC Self-Injection Pattern Compliance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for git diff

      - name: Check RPC self-injection pattern
        run: |
          echo "🔍 Checking RPC self-injection pattern compliance (ADR-015 Phase 1A)..."
          echo ""

          # Get all modified SQL migration files in this PR
          MIGRATION_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep 'supabase/migrations/.*\.sql$' || true)

          if [ -z "$MIGRATION_FILES" ]; then
            echo "✅ No migration files modified in this PR"
            exit 0
          fi

          echo "Migration files to check:"
          echo "$MIGRATION_FILES" | sed 's/^/  - /'
          echo ""

          VIOLATIONS_FOUND=0

          # Check each migration file
          for FILE in $MIGRATION_FILES; do
            # Skip if file doesn't exist (deletion)
            if [ ! -f "$FILE" ]; then
              continue
            fi

            # Check if file contains RPC function definitions
            RPC_COUNT=$(grep -icE 'CREATE\s+OR\s+REPLACE\s+FUNCTION\s+rpc_' "$FILE" || true)

            if [ "$RPC_COUNT" -gt 0 ]; then
              # RPC function(s) found - verify canonical context call exists
              # Only set_rls_context_from_staff or set_rls_context_internal are valid (ADR-024)
              # Bare set_rls_context() is DROPPED and must not be used
              CONTEXT_CALL=$(grep -icE 'PERFORM\s+set_rls_context_(from_staff|internal)\s*\(' "$FILE" || true)
              # Count lines with bare set_rls_context( excluding _from_staff and _internal
              DEPRECATED_CALL=$(grep -P 'PERFORM\s+set_rls_context\s*\(' "$FILE" | grep -vcP 'set_rls_context_(from_staff|internal)' || echo 0)

              if [ "$CONTEXT_CALL" -eq 0 ]; then
                echo "❌ VIOLATION: $FILE"
                echo "   Found $RPC_COUNT RPC function(s) but NO context injection call"
                echo ""
                VIOLATIONS_FOUND=$((VIOLATIONS_FOUND + 1))
              elif [ "$DEPRECATED_CALL" -gt 0 ]; then
                echo "❌ VIOLATION: $FILE"
                echo "   Uses DROPPED set_rls_context() — must use set_rls_context_from_staff() or set_rls_context_internal()"
                echo ""
                VIOLATIONS_FOUND=$((VIOLATIONS_FOUND + 1))
              else
                echo "✅ $FILE: $RPC_COUNT RPC function(s) with canonical context injection"
              fi
            fi
          done

          # Summary and exit
          if [ "$VIOLATIONS_FOUND" -gt 0 ]; then
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "❌ PR BLOCKED: $VIOLATIONS_FOUND migration(s) violate RPC self-injection rule"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "REQUIRED PATTERN (ADR-024):"
            echo "────────────────────────────────────────────────────────────"
            echo "CREATE OR REPLACE FUNCTION rpc_your_function(...)"
            echo "  RETURNS ... LANGUAGE plpgsql SECURITY DEFINER"
            echo "  SET search_path = ''"
            echo "AS \$\$"
            echo "BEGIN"
            echo "  -- Derive context from JWT (REQUIRED — ADR-024)"
            echo "  PERFORM set_rls_context_from_staff(gen_random_uuid()::text);"
            echo "  -- ... function body ..."
            echo "END;"
            echo "\$\$;"
            echo ""
            echo "VALID context functions (pick one):"
            echo "  • set_rls_context_from_staff(p_correlation_id) — derives from JWT staff_id"
            echo "  • set_rls_context_internal(p_actor_id, p_casino_id, p_staff_role, p_correlation_id)"
            echo ""
            echo "DROPPED (do NOT use):"
            echo "  • set_rls_context() — removed per ADR-024"
            echo "────────────────────────────────────────────────────────────"
            echo ""
            echo "REFERENCE:"
            echo "  • ADR-024: Authoritative context derivation"
            echo "  • ADR-015: Connection pooling strategy"
            echo ""
            echo "WHY REQUIRED:"
            echo "  • Supabase transaction pooling reuses connections"
            echo "  • SET LOCAL context is lost between transactions"
            echo "  • RPC must inject context in same transaction as operation"
            echo ""
            exit 1
          fi

          echo ""
          echo "✅ All RPC functions follow self-injection pattern"
          exit 0
