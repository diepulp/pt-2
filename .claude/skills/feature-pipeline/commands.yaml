# Feature Pipeline Slash Commands
# These commands provide entry points for the feature development pipeline
# AUTHORITATIVE SOURCE: SKILL.md — this file mirrors it exactly.

commands:
  feature-start:
    description: "Start a new feature development pipeline (FIB context load + Phase 0: SRM)"
    usage: "/feature-start <feature-name>"
    arguments:
      - name: feature-name
        required: true
        description: "kebab-case feature identifier (e.g., player-identity-enrollment)"
    example: "/feature-start player-identity-enrollment"
    workflow: |
      1. Load FIB context (pre-phase — not a gate):
         - Look for docs/60-release/FIB-H-{feature-name}.md and FIB-S-{feature-name}.json
         - If both present → mode: fib-bound. Snapshot coherence anchors into checkpoint.
         - If either missing → mode: fib-absent. Display warning:
             [FIB CONTEXT] Feature: {feature-name}
             ─────────────────────────────────────────
             FIB-H: {found | MISSING}   FIB-S: {found | MISSING}
             Mode: fib-absent

             Warning: No FIB pair found. Pipeline will run without scope anchoring.
             Options:
               1. Continue without FIBs
               2. Halt — I will supply FIBs first
                  Template: docs/60-release/FEATURE_INTAKE_BRIEF_FORM.md (§11 quick-use blank)
                  Schema:   docs/60-release/zachman_interpolated_feature_intake_recommendation.md
           Wait for user response before continuing.
      2. Create checkpoint file with schema_version=4, status="in_progress".
      3. Create feature directory: docs/20-architecture/specs/{feature-name}/
      4. Load SRM for ownership analysis.
      5. Guide user through Phase 0: SRM-First Ownership.
      6. Generate Feature Boundary Statement draft.
      7. Wait for gate approval: srm-ownership.

  feature-status:
    description: "Show current feature pipeline status"
    usage: "/feature-status [feature-name]"
    arguments:
      - name: feature-name
        required: false
        description: "Feature to check (defaults to most recent)"
    example: "/feature-status player-identity-enrollment"
    output: |
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      Feature Pipeline: {feature-name}
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      FIB Context: {fib-bound | fib-absent}
        FIB-H: {path | not loaded}
        FIB-S: {path | not loaded}

      Current Phase: {phase_number} - {phase_name}
      Status: {in_progress | blocked | complete}

      Gates:
        ✅ srm-ownership
        ✅ scaffold-approved
        ⏳ design-approved (current)
        ⬜ sec-approved
        ⬜ adr-frozen
        ⬜ prd-approved

      DA Review: {not-run | passed | failed (attempt N/2)}

      Artifacts:
        Boundary: docs/20-architecture/specs/{feature}/FEATURE_BOUNDARY.md
        Scaffold: docs/01-scaffolds/SCAFFOLD-###-{slug}.md
        RFC:      (pending)
        SEC Note: (pending)
        ADR:      (pending)
        PRD:      (pending)

      Next Action: Complete Design Brief / RFC for design review

  feature-resume:
    description: "Resume feature pipeline from last checkpoint"
    usage: "/feature-resume [feature-name]"
    arguments:
      - name: feature-name
        required: false
        description: "Feature to resume (defaults to most recent)"
    example: "/feature-resume player-identity-enrollment"
    workflow: |
      1. Load checkpoint from .claude/skills/feature-pipeline/checkpoints/{feature}.json
      2. Migrate if needed:
         - schema_version missing (v1): migrate to v2 (map gates_passed/gates_pending arrays)
         - schema_version=2: migrate to v3 (inject fib-approved gate, fib_h/fib_s artifacts,
           expand coherence block, shift current_phase +1). Prompt human to backfill FIB-H/FIB-S.
         - schema_version=3: migrate to v4 (inject fib_context block from fib-approved gate data;
           remove fib-approved from gates; remove fib_h/fib_s from artifacts;
           shift current_phase -1, clamp minimum to 0).
      3. Display FIB context mode, current phase, and pending gates.
      4. Show next action required.
      5. Continue from current phase.

  feature-gate:
    description: "Run validation for a specific gate"
    usage: "/feature-gate <gate-name>"
    arguments:
      - name: gate-name
        required: true
        description: "Gate to validate (srm-ownership, scaffold-approved, design-approved, sec-approved, adr-frozen, prd-approved)"
    example: "/feature-gate srm-ownership"
    gates:
      srm-ownership:
        validation: "Ownership sentence exists and bounded context table is complete"
        artifact: "FEATURE_BOUNDARY.md"
      scaffold-approved:
        validation: "Scaffold has intent, 5+ non-goals consistent with FIB exclusions (fib-bound), 2+ options with tradeoffs, cites FIB scope authority (fib-bound)"
        artifact: "SCAFFOLD-###-{slug}.md"
      design-approved:
        validation: "RFC names decisions that need ADRs; scope does not violate FIB non-goals (fib-bound)"
        artifact: "RFC-###-{slug}.md"
      sec-approved:
        validation: "SEC note covers assets/threats/controls, sensitive fields justified"
        artifact: "SEC-NOTE-{slug}.md"
      adr-frozen:
        validation: "ADR contains only context/decision/consequences, no SQL/code; decisions do not depend on excluded FIB items (fib-bound)"
        artifact: "ADR-###-{slug}.md"
      prd-approved:
        validation: "PRD has testable acceptance criteria, references FIB containment loop (fib-bound), intake_ref/structured_ref in frontmatter (fib-bound), DA review passed (no P0)"
        artifact: "PRD-###-{slug}.md"

# Gate Protocol
gate_protocol:
  approval_options:
    - "y"    # Approve and continue
    - "n"    # Reject and provide feedback
    - "edit" # Modify artifact before approval
    - "skip" # Skip gate (with justification)

  checkpoint_behavior:
    on_approval: "Update checkpoint gates object, advance to next phase"
    on_rejection: "Stay at current phase, record feedback"
    on_skip: "Record justification in checkpoint, advance with warning"

# Phase Definitions — mirrors SKILL.md exactly
phases:
  0:
    name: "SRM-First Ownership"
    gate: "srm-ownership"
    artifact: "FEATURE_BOUNDARY.md"
    next: 1

  1:
    name: "Feature Scaffold"
    gate: "scaffold-approved"
    artifact: "SCAFFOLD-###-{slug}.md"
    next: 2

  2:
    name: "Design Brief / RFC"
    gate: "design-approved"
    artifact: "RFC-###-{slug}.md"
    delegate_to: "lead-architect"
    next: 3

  3:
    name: "SEC Note"
    gate: "sec-approved"
    artifact: "SEC-NOTE-{slug}.md"
    next: 4

  4:
    name: "ADR(s)"
    gate: "adr-frozen"
    artifact: "ADR-###-{slug}.md"
    delegate_to: "lead-architect"
    optional: true
    next: 5

  5:
    name: "PRD"
    gate: "prd-approved"
    artifact: "PRD-###-{slug}.md"
    delegate_to: "prd-writer"
    terminal: true
    # HARD STOP: Phase 5 is the last phase. There is no Phase 6.
    # On prd-approved, set status to "design-complete" and display handoff.
    # Do NOT generate EXEC-SPECs, DOD gates, workstreams, or any build artifact.
